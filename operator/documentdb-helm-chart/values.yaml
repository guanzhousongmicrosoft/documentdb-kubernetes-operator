namespace: documentdb-operator
replicaCount: 1

# Deprecated compatibility field.
# Prefer runtimeDefaults.documentdb.ref and runtimeDefaults.gateway.ref instead.
# When set, the chart still passes DOCUMENTDB_VERSION for one-release compatibility.
documentDbVersion: "0.109.0"

# Gateway image pull policy for the gateway sidecar container.
# Valid values: Always, IfNotPresent, Never. Defaults to IfNotPresent if not set.
gatewayImagePullPolicy: ""

# DocumentDB extension image pull policy for the ImageVolume.
# Valid values: Always, IfNotPresent, Never. If not set, Kubernetes default behavior is used.
# This sets ImageVolumeSource.PullPolicy on the CNPG extension configuration
# (see operator/src/internal/cnpg/cnpg_cluster.go).
documentDbImagePullPolicy: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "documentdb-operator"
  
# WAL Replica feature flag
walReplica: false  # Set to true to deploy the WAL replica plugin

image:
  documentdbk8soperator:
    # Default released operator image reference, synchronized from release/artifacts.yaml.
    # When cleared, Helm falls back to repository + Chart.appVersion for compatibility.
    ref: ghcr.io/documentdb/documentdb-kubernetes-operator/operator:0.2.0
    digest: "sha256:655729d47aaec8ce2d33335ffdd522aacefd1a8d6f5476c6ddf26a923efba16f"
    repository: ghcr.io/documentdb/documentdb-kubernetes-operator/operator
    pullPolicy: Always
  sidecarinjector:
    # Default released sidecar image reference, synchronized from release/artifacts.yaml.
    # When cleared, Helm falls back to repository + Chart.appVersion for compatibility.
    ref: ghcr.io/documentdb/documentdb-kubernetes-operator/sidecar:0.2.0
    digest: "sha256:357ecacabd8371e0e8fc936dc7e3660618e5030c971f982d6b946fcf6e155368"
    repository: ghcr.io/documentdb/documentdb-kubernetes-operator/sidecar
    pullPolicy: Always
  walreplica:
    # Optional explicit image reference for the WAL replica deployment.
    # When empty, Helm uses repository + Chart.appVersion.
    ref: ""
    digest: ""
    repository: ghcr.io/documentdb/documentdb-kubernetes-operator/wal-replica
    pullPolicy: Always

runtimeDefaults:
  # Explicit default image references passed to the operator for DocumentDB runtime components.
  # These defaults are used when a DocumentDB CR does not set spec.documentDBImage or spec.gatewayImage.
  documentdb:
    ref: ghcr.io/documentdb/documentdb-kubernetes-operator/documentdb:0.109.0
    digest: "sha256:5de0ddb54c6423b226cef7b2bf5ffe1db0369640a854ddb57b56c21fbfe863db"
  gateway:
    ref: ghcr.io/documentdb/documentdb-kubernetes-operator/gateway:0.109.0
    digest: "sha256:039691edfbe5212fb855067809a8b946a16fa317873d6fb485289291620f53ed"
  # Reserved for a later phase that moves Postgres defaulting from CRD/schema defaults
  # to explicit chart/operator configuration.
  postgres:
    ref: ghcr.io/cloudnative-pg/postgresql:18-minimal-trixie
    digest: ""

cloudnative-pg:
  namespaceOverride: cnpg-system
  additionalEnv:
    - name: ENABLE_INSTANCE_MANAGER_INPLACE_UPDATES
      value: "true"
