apiVersion: apps/v1
kind: Deployment
metadata:
  name: documentdb-operator
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "documentdb-chart.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: "Helm"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: documentdb-operator
        image: "{{ .Values.image.documentdbk8soperator.repository }}:{{ .Values.image.documentdbk8soperator.tag | default .Chart.AppVersion }}"
        imagePullPolicy: "{{ .Values.image.documentdbk8soperator.pullPolicy }}"
        args:
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        # Readiness probe gates the Service endpoint so the API server cannot
        # route webhook requests until the TLS cert is loaded (CNPG pattern).
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        startupProbe:
          httpGet:
            path: /readyz
            port: health
          failureThreshold: 30
          periodSeconds: 2
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-cert
          readOnly: true
        env:
        - name: GATEWAY_PORT
          value: "10260"
        {{- if .Values.documentDbVersion }}
        - name: DOCUMENTDB_VERSION
          value: "{{ .Values.documentDbVersion }}"
        {{- end }}
        {{- if .Values.gatewayImagePullPolicy }}
        - name: GATEWAY_IMAGE_PULL_POLICY
          value: "{{ .Values.gatewayImagePullPolicy }}"
        {{- end }}
        {{- if .Values.documentDbImagePullPolicy }}
        - name: DOCUMENTDB_IMAGE_PULL_POLICY
          value: "{{ .Values.documentDbImagePullPolicy }}"
        {{- end }}
      volumes:
      - name: webhook-cert
        secret:
          secretName: documentdb-webhook-tls
          defaultMode: 420
          # Allow the pod to start before cert-manager creates the Secret.
          # The webhook server (and readiness probe) will stay unhealthy until
          # the cert files appear, keeping the pod out of the Service endpoints.
          optional: true
