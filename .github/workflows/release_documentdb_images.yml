name: RELEASE - Promote DocumentDB Images

# Promotes documentdb extension and gateway candidate images to release tags,
# then creates a PR to update default versions across the codebase.
# This workflow handles only the DATABASE version track recorded in release/artifacts.yaml.
# For operator/sidecar releases, see release_operator.yml.

on:
  workflow_dispatch:
    inputs:
      candidate_version:
        description: 'Database candidate tag to promote (e.g., 0.111.0-build-123456789-1-deadbee)'
        required: true
      version:
        description: 'Database image release version (e.g., 0.111.0)'
        required: true
        default: '0.109.0'
      update_defaults:
        description: 'Create PR to update default image versions in code'
        required: false
        default: true
        type: boolean

  workflow_call:
    inputs:
      candidate_version:
        description: 'Database candidate tag to promote (e.g., 0.111.0-build-123456789-1-deadbee)'
        required: true
        type: string
      version:
        description: 'Database image release version (e.g., 0.111.0)'
        required: false
        type: string
        default: '0.109.0'
      update_defaults:
        description: 'Create PR to update default image versions in code'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Promote documentdb and gateway images (retag candidate → release)
  # ---------------------------------------------------------------------------
  promote-database-images:
    name: Promote ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [documentdb, gateway]
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Verify candidate exists
        run: |
          echo "Verifying ${{ matrix.image }}:${{ inputs.candidate_version }} exists..."
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ inputs.candidate_version }}

      - name: Retag existing manifest
        env:
          SOURCE_TAG: ${{ inputs.candidate_version }}
          TARGET_TAG: ${{ inputs.version }}
        run: |
          echo "Promoting ${{ matrix.image }} from $SOURCE_TAG to $TARGET_TAG"
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ env.TARGET_TAG }} \
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ env.SOURCE_TAG }}

  # ---------------------------------------------------------------------------
  # Update default versions in code and create PR
  # ---------------------------------------------------------------------------
  update-defaults:
    name: Update Default Versions
    runs-on: ubuntu-latest
    needs: promote-database-images
    if: ${{ inputs.update_defaults == true }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect current default version
        id: current
        run: |
          CURRENT=$(sed -nE 's|^[[:space:]]*databaseTrack:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+)[[:space:]]*$|\1|p' \
            release/artifacts.yaml | head -1)
          if [[ -z "$CURRENT" ]]; then
            echo "Failed to extract current default version from release/artifacts.yaml" >&2
            exit 1
          fi
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current default version: $CURRENT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/src/go.mod

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Resolve promoted image digests
        id: release_digests
        run: |
          set -euo pipefail
          DOCUMENTDB_DIGEST=$(docker buildx imagetools inspect ghcr.io/${{ github.repository }}/documentdb:${{ inputs.version }} | awk '/^Digest:/ { print $2 }')
          GATEWAY_DIGEST=$(docker buildx imagetools inspect ghcr.io/${{ github.repository }}/gateway:${{ inputs.version }} | awk '/^Digest:/ { print $2 }')
          echo "documentdb_digest=$DOCUMENTDB_DIGEST" >> $GITHUB_OUTPUT
          echo "gateway_digest=$GATEWAY_DIGEST" >> $GITHUB_OUTPUT

      - name: Sync version references from canonical manifest
        run: |
          set -euo pipefail

          cd operator/src
          go run ./cmd/release-manifest sync \
            --manifest ../../release/artifacts.yaml \
            --repo-root ../.. \
            --database-track "${{ inputs.version }}" \
            --documentdb-digest "${{ steps.release_digests.outputs.documentdb_digest }}" \
            --gateway-digest "${{ steps.release_digests.outputs.gateway_digest }}"

      - name: Check for metadata changes
        id: metadata_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: ${{ steps.metadata_changes.outputs.has_changes == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump DocumentDB default images to ${{ inputs.version }}"
          title: "chore: bump DocumentDB default images to ${{ inputs.version }}"
          body: |
            ## Automated DocumentDB Version Bump

            Promoted images `documentdb` and `gateway` from candidate `${{ inputs.candidate_version }}` to release `${{ inputs.version }}`.

            ### Changes
            - Updated `release/artifacts.yaml`
            - Synced Helm chart defaults from the canonical manifest
            - Synced workflow defaults and upgrade baselines from the canonical manifest
            - Updated the public gateway Dockerfile source image default

            ### Image References
            - `ghcr.io/${{ github.repository }}/documentdb:${{ inputs.version }}`
            - `ghcr.io/${{ github.repository }}/gateway:${{ inputs.version }}`

            ---
            *Auto-generated by `release_documentdb_images.yml`*
          branch: auto/documentdb-${{ inputs.version }}
          delete-branch: true
          labels: |
            automated
            version-bump

      - name: Release summary
        run: |
          echo "## DocumentDB Image Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Database Version**: \`${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Images Promoted**: documentdb, gateway" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Tag**: \`${{ inputs.candidate_version }}\` → \`${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.metadata_changes.outputs.has_changes }}" == "true" ]]; then
            echo "- **PR Created**: Updates release metadata from \`${{ steps.current.outputs.current_version }}\` toward \`${{ inputs.version }}\`, including digest metadata" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **No PR needed**: Canonical release metadata already matches the promoted images" >> $GITHUB_STEP_SUMMARY
          fi
