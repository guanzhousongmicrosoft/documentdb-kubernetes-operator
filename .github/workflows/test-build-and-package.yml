name: TEST - Build and Package for Tests

on:
  workflow_call:
    inputs:
      version:
        description: 'Version for both image tag and chart version'
        required: false
        default: '0.1.0'
        type: string
      documentdb_ref:
        description: 'DocumentDB repo ref (tag, branch, or commit SHA) for building packages'
        required: false
        default: 'main'
        type: string
    outputs:
      image_tag:
        description: 'Built image tag'
        value: ${{ jobs.consolidate-images.outputs.image_tag }}
      chart_version:
        description: 'Built chart version'
        value: ${{ jobs.create-helm-chart.outputs.chart_version }}

permissions:
  contents: read

env:
  VERSION: ${{ inputs.version }}-test-${{ github.run_id }}
  IMAGE_TAG: ${{ inputs.version }}-test-${{ github.run_id }}
  CHART_NAME: operator/documentdb-helm-chart
  CHART_VERSION: ${{ inputs.version }}-test-${{ github.run_id }}

jobs:
  build-operator:
    name: Build Operator Images
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            base_arch: AMD64
            runner: ubuntu-22.04
          - arch: arm64
            base_arch: ARM64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build operator Docker image for ${{ matrix.arch }}
      run: |
        echo "Building operator Docker image for ${{ matrix.arch }} architecture..."
        docker buildx build \
          --platform linux/${{ matrix.arch }} \
          --build-arg ARCH=${{ matrix.base_arch }} \
          --tag ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}-${{ matrix.arch }} \
          --load \
          -f operator/src/Dockerfile operator/src/
        
        echo "✓ Operator Docker image built successfully for ${{ matrix.arch }}"

    - name: Save operator Docker image as artifact
      run: |
        echo "Saving operator ${{ matrix.arch }} Docker image as tar file..."
        docker save ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}-${{ matrix.arch }} > operator-${{ matrix.arch }}-image.tar
        echo "✓ Operator ${{ matrix.arch }} Docker image saved to tar file"

    - name: Upload operator Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-docker-operator-${{ matrix.arch }}
        path: operator-${{ matrix.arch }}-image.tar
        retention-days: 1

  build-sidecar:
    name: Build Sidecar Images
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            base_arch: AMD64
            runner: ubuntu-22.04
          - arch: arm64
            base_arch: ARM64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build sidecar Docker image for ${{ matrix.arch }}
      run: |
        echo "Building sidecar Docker image for ${{ matrix.arch }} architecture..."
        docker buildx build \
          --platform linux/${{ matrix.arch }} \
          --build-arg ARCH=${{ matrix.base_arch }} \
          --tag ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}-${{ matrix.arch }} \
          --load \
          -f operator/cnpg-plugins/sidecar-injector/Dockerfile operator/cnpg-plugins/sidecar-injector/
        
        echo "✓ Sidecar Docker image built successfully for ${{ matrix.arch }}"

    - name: Save sidecar Docker image as artifact
      run: |
        echo "Saving sidecar ${{ matrix.arch }} Docker image as tar file..."
        docker save ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}-${{ matrix.arch }} > sidecar-${{ matrix.arch }}-image.tar
        echo "✓ Sidecar ${{ matrix.arch }} Docker image saved to tar file"

    - name: Upload sidecar Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-docker-sidecar-${{ matrix.arch }}
        path: sidecar-${{ matrix.arch }}-image.tar
        retention-days: 1

  build-packages:
    name: Build DocumentDB Packages (${{ matrix.arch }})
    timeout-minutes: 60
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      DOCUMENTDB_REPO: documentdb/documentdb
      DOCUMENTDB_REPO_REF: ${{ inputs.documentdb_ref || 'main' }}
    steps:
    - name: Checkout documentdb source
      uses: actions/checkout@v4
      with:
        repository: ${{ env.DOCUMENTDB_REPO }}
        ref: ${{ env.DOCUMENTDB_REPO_REF }}

    - name: Build extension deb (PG18)
      run: ./packaging/build_packages.sh --os deb13 --pg 18 --output-dir packages

    - name: Build gateway deb
      # Gateway is a pure Rust binary; PG version is a passthrough and does not affect the output.
      # Using pg 17 matches the upstream documentdb repo convention (gateway built once, not per-PG).
      run: ./packaging/build_gateway_packages.sh --os deb13 --pg 17 --output-dir packages

    - name: Upload packages
      uses: actions/upload-artifact@v4
      with:
        name: build-packages-${{ matrix.arch }}
        path: packages/*.deb
        retention-days: 1
        if-no-files-found: error
        compression-level: 0

    - name: Upload gateway runtime files
      if: matrix.arch == 'amd64'
      uses: actions/upload-artifact@v4
      with:
        name: build-gateway-runtime-files
        path: |
          scripts/utils.sh
          pg_documentdb_gw/SetupConfiguration.json
        retention-days: 1
        if-no-files-found: error

  build-documentdb:
    name: Build DocumentDB Images
    timeout-minutes: 30
    needs: [build-packages]
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            base_arch: AMD64
            runner: ubuntu-22.04
          - arch: arm64
            base_arch: ARM64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download packages
      uses: actions/download-artifact@v4
      with:
        name: build-packages-${{ matrix.arch }}
        path: packages/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build documentdb Docker image for ${{ matrix.arch }}
      run: |
        set -euo pipefail
        echo "Building documentdb Docker image for ${{ matrix.arch }} architecture..."
        DEB_FILE=$(ls packages/ | grep -E 'postgresql.*documentdb.*\.deb' | grep -v dbgsym | head -1)
        if [[ -z "$DEB_FILE" ]]; then
          echo "ERROR: No DocumentDB extension .deb found in packages/" >&2
          ls -la packages/ >&2
          exit 1
        fi
        echo "Using deb: $DEB_FILE"
        docker buildx build \
          --platform linux/${{ matrix.arch }} \
          --build-arg PG_MAJOR=18 \
          --build-arg DEB_PACKAGE_REL_PATH=packages/$DEB_FILE \
          --tag ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/documentdb:${{ env.IMAGE_TAG }}-${{ matrix.arch }} \
          --load \
          -f .github/dockerfiles/Dockerfile_extension .
        
        echo "✓ DocumentDB Docker image built successfully for ${{ matrix.arch }}"

    - name: Save documentdb Docker image as artifact
      run: |
        echo "Saving documentdb ${{ matrix.arch }} Docker image as tar file..."
        docker save ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/documentdb:${{ env.IMAGE_TAG }}-${{ matrix.arch }} > documentdb-${{ matrix.arch }}-image.tar
        echo "✓ DocumentDB ${{ matrix.arch }} Docker image saved to tar file"

    - name: Upload documentdb Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-docker-documentdb-${{ matrix.arch }}
        path: documentdb-${{ matrix.arch }}-image.tar
        retention-days: 1

  build-gateway:
    name: Build Gateway Images
    timeout-minutes: 30
    needs: [build-packages]
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            base_arch: AMD64
            runner: ubuntu-22.04
          - arch: arm64
            base_arch: ARM64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download packages
      uses: actions/download-artifact@v4
      with:
        name: build-packages-${{ matrix.arch }}
        path: packages/

    - name: Download gateway runtime files
      uses: actions/download-artifact@v4
      with:
        name: build-gateway-runtime-files
        path: gateway-runtime/

    - name: Prepare gateway build context
      run: |
        set -e
        mkdir -p gateway-context/packages gateway-context/scripts gateway-context/pg_documentdb_gw
        cp packages/*gateway*.deb gateway-context/packages/
        cp gateway-runtime/scripts/utils.sh gateway-context/scripts/
        cp gateway-runtime/pg_documentdb_gw/SetupConfiguration.json gateway-context/pg_documentdb_gw/
        cp .github/dockerfiles/gateway_entrypoint.sh gateway-context/scripts/
        ls gateway-context/packages/*.deb || { echo "ERROR: Gateway deb not found"; exit 1; }

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build gateway Docker image for ${{ matrix.arch }}
      run: |
        set -euo pipefail
        echo "Building gateway Docker image for ${{ matrix.arch }} architecture..."
        GW_DEB=$(ls gateway-context/packages/ | grep -E 'gateway.*\.deb' | head -1)
        if [[ -z "$GW_DEB" ]]; then
          echo "ERROR: No gateway .deb found in gateway-context/packages/" >&2
          ls -la gateway-context/packages/ >&2
          exit 1
        fi
        echo "Using deb: $GW_DEB"
        docker buildx build \
          --platform linux/${{ matrix.arch }} \
          --build-arg GATEWAY_DEB_REL_PATH=packages/$GW_DEB \
          --tag ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/gateway:${{ env.IMAGE_TAG }}-${{ matrix.arch }} \
          --load \
          -f .github/dockerfiles/Dockerfile_gateway_deb gateway-context
        
        echo "✓ Gateway Docker image built successfully for ${{ matrix.arch }}"

    - name: Save gateway Docker image as artifact
      run: |
        echo "Saving gateway ${{ matrix.arch }} Docker image as tar file..."
        docker save ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/gateway:${{ env.IMAGE_TAG }}-${{ matrix.arch }} > gateway-${{ matrix.arch }}-image.tar
        echo "✓ Gateway ${{ matrix.arch }} Docker image saved to tar file"

    - name: Upload gateway Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-docker-gateway-${{ matrix.arch }}
        path: gateway-${{ matrix.arch }}-image.tar
        retention-days: 1

  consolidate-images:
    name: Consolidate Platform Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-operator, build-sidecar, build-packages, build-documentdb, build-gateway]
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
    steps:
    - name: Download all image artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: 'build-docker-*'
        path: ./artifacts

    - name: Load and consolidate all Docker images
      run: |
        echo "Loading all Docker images from artifacts..."
        
        # List available artifacts first
        echo "Available artifact directories:"
        ls -la ./artifacts/
        
        # Load operator images
        echo "Loading operator AMD64 image..."
        if [ -f ./artifacts/build-docker-operator-amd64/operator-amd64-image.tar ]; then
          docker load < ./artifacts/build-docker-operator-amd64/operator-amd64-image.tar
          echo "✓ Operator AMD64 image loaded"
        else
          echo "❌ Operator AMD64 image file not found"
          ls -la ./artifacts/build-docker-operator-amd64/ || echo "Directory not found"
          exit 1
        fi
        
        echo "Loading operator ARM64 image..."
        if [ -f ./artifacts/build-docker-operator-arm64/operator-arm64-image.tar ]; then
          docker load < ./artifacts/build-docker-operator-arm64/operator-arm64-image.tar
          echo "✓ Operator ARM64 image loaded"
        else
          echo "❌ Operator ARM64 image file not found"
          ls -la ./artifacts/build-docker-operator-arm64/ || echo "Directory not found"
          exit 1
        fi
        
        # Load sidecar images
        echo "Loading sidecar AMD64 image..."
        if [ -f ./artifacts/build-docker-sidecar-amd64/sidecar-amd64-image.tar ]; then
          docker load < ./artifacts/build-docker-sidecar-amd64/sidecar-amd64-image.tar
          echo "✓ Sidecar AMD64 image loaded"
        else
          echo "❌ Sidecar AMD64 image file not found"
          ls -la ./artifacts/build-docker-sidecar-amd64/ || echo "Directory not found"
          exit 1
        fi
        
        echo "Loading sidecar ARM64 image..."
        if [ -f ./artifacts/build-docker-sidecar-arm64/sidecar-arm64-image.tar ]; then
          docker load < ./artifacts/build-docker-sidecar-arm64/sidecar-arm64-image.tar
          echo "✓ Sidecar ARM64 image loaded"
        else
          echo "❌ Sidecar ARM64 image file not found"
          ls -la ./artifacts/build-docker-sidecar-arm64/ || echo "Directory not found"
          exit 1
        fi
        
        # Load documentdb images
        echo "Loading documentdb AMD64 image..."
        if [ -f ./artifacts/build-docker-documentdb-amd64/documentdb-amd64-image.tar ]; then
          docker load < ./artifacts/build-docker-documentdb-amd64/documentdb-amd64-image.tar
          echo "✓ DocumentDB AMD64 image loaded"
        else
          echo "❌ DocumentDB AMD64 image file not found"
          ls -la ./artifacts/build-docker-documentdb-amd64/ || echo "Directory not found"
          exit 1
        fi
        
        echo "Loading documentdb ARM64 image..."
        if [ -f ./artifacts/build-docker-documentdb-arm64/documentdb-arm64-image.tar ]; then
          docker load < ./artifacts/build-docker-documentdb-arm64/documentdb-arm64-image.tar
          echo "✓ DocumentDB ARM64 image loaded"
        else
          echo "❌ DocumentDB ARM64 image file not found"
          ls -la ./artifacts/build-docker-documentdb-arm64/ || echo "Directory not found"
          exit 1
        fi
        
        # Load gateway images
        echo "Loading gateway AMD64 image..."
        if [ -f ./artifacts/build-docker-gateway-amd64/gateway-amd64-image.tar ]; then
          docker load < ./artifacts/build-docker-gateway-amd64/gateway-amd64-image.tar
          echo "✓ Gateway AMD64 image loaded"
        else
          echo "❌ Gateway AMD64 image file not found"
          ls -la ./artifacts/build-docker-gateway-amd64/ || echo "Directory not found"
          exit 1
        fi
        
        echo "Loading gateway ARM64 image..."
        if [ -f ./artifacts/build-docker-gateway-arm64/gateway-arm64-image.tar ]; then
          docker load < ./artifacts/build-docker-gateway-arm64/gateway-arm64-image.tar
          echo "✓ Gateway ARM64 image loaded"
        else
          echo "❌ Gateway ARM64 image file not found"
          ls -la ./artifacts/build-docker-gateway-arm64/ || echo "Directory not found"
          exit 1
        fi
        
        echo "✓ All Docker images loaded successfully"
        echo "Loaded images:"
        docker images | grep documentdb-kubernetes-operator | sort

    - name: Save platform-specific images as artifacts
      run: |
        echo "Saving platform-specific images as artifacts..."
        
        # Save all 8 platform-specific images (4 types x 2 architectures)
        docker save \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}-amd64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}-arm64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}-amd64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}-arm64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/documentdb:${{ env.IMAGE_TAG }}-amd64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/documentdb:${{ env.IMAGE_TAG }}-arm64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/gateway:${{ env.IMAGE_TAG }}-amd64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/gateway:${{ env.IMAGE_TAG }}-arm64 \
          > platform-specific-images.tar
        
        echo "✓ Platform-specific images saved as artifacts"

    - name: Upload platform-specific Docker images
      uses: actions/upload-artifact@v4
      with:
        name: build-platform-images
        path: platform-specific-images.tar
        retention-days: 1

  create-helm-chart:
    name: Create Platform-Specific Helm Charts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [consolidate-images]
    strategy:
      matrix:
        arch: [amd64, arm64]
    outputs:
      chart_version: ${{ env.CHART_VERSION }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: Update Helm chart with platform-specific image references
      run: |
        # Create platform-specific chart directory
        cp -r operator/documentdb-helm-chart documentdb-chart-${{ matrix.arch }}
        
        # Update the operator image tag and repository in values.yaml for this platform
        # Note: Using CHART_VERSION with arch suffix to match image tags exactly
        sed -i '/documentdbk8soperator:/,/tag:/ s|tag:.*|tag: "${{ env.CHART_VERSION }}-${{ matrix.arch }}"|' documentdb-chart-${{ matrix.arch }}/values.yaml
        sed -i '/documentdbk8soperator:/,/repository:/ s|repository:.*|repository: "ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator"|' documentdb-chart-${{ matrix.arch }}/values.yaml
        
        # Update the sidecar image tag and repository in values.yaml for this platform
        sed -i '/sidecarinjector:/,/tag:/ s|tag:.*|tag: "${{ env.CHART_VERSION }}-${{ matrix.arch }}"|' documentdb-chart-${{ matrix.arch }}/values.yaml
        sed -i '/sidecarinjector:/,/repository:/ s|repository:.*|repository: "ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar"|' documentdb-chart-${{ matrix.arch }}/values.yaml
        
        # Update Chart.yaml version, appVersion and name for this platform
        # Both version and appVersion include arch suffix to match image tags exactly
        # Chart name doesn't include arch since version already has it
        sed -i "s|^version:.*|version: ${{ env.CHART_VERSION }}-${{ matrix.arch }}|g" documentdb-chart-${{ matrix.arch }}/Chart.yaml
        sed -i "s|^appVersion:.*|appVersion: \"${{ env.CHART_VERSION }}-${{ matrix.arch }}\"|g" documentdb-chart-${{ matrix.arch }}/Chart.yaml
        sed -i "s|^name:.*|name: documentdb-chart|g" documentdb-chart-${{ matrix.arch }}/Chart.yaml
        
        echo "Updated Chart.yaml for ${{ matrix.arch }}:"
        cat documentdb-chart-${{ matrix.arch }}/Chart.yaml
        
        echo "Updated values.yaml for ${{ matrix.arch }} (with platform-specific image references):"
        cat documentdb-chart-${{ matrix.arch }}/values.yaml

    - name: Package platform-specific Helm chart
      run: |
        # Clean up any existing Chart.lock files
        rm -f documentdb-chart-${{ matrix.arch }}/Chart.lock
        
        echo "Running helm dependency update for documentdb-chart-${{ matrix.arch }}..."
        helm dependency update documentdb-chart-${{ matrix.arch }}
        
        echo "Validating chart..."
        helm lint documentdb-chart-${{ matrix.arch }}
        
        echo "Packaging chart with version ${{ env.CHART_VERSION }}-${{ matrix.arch }} for ${{ matrix.arch }}..."
        helm package documentdb-chart-${{ matrix.arch }} --version ${{ env.CHART_VERSION }}-${{ matrix.arch }}
        
        echo "Generated chart package for ${{ matrix.arch }}:"
        ls -la *.tgz

    - name: Upload platform-specific Helm chart artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-helm-chart-${{ matrix.arch }}
        path: "*.tgz"
        retention-days: 1

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [consolidate-images, create-helm-chart]
    steps:
    - name: Generate Build Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Configuration:" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Generated Tag**: ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Mode**: Platform-specific artifacts with architecture suffixes" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### Built Artifacts:" >> $GITHUB_STEP_SUMMARY
        echo "- **Operator Images**: Platform-specific (AMD64 + ARM64) with suffix tags" >> $GITHUB_STEP_SUMMARY
        echo "- **Sidecar Images**: Platform-specific (AMD64 + ARM64) with suffix tags" >> $GITHUB_STEP_SUMMARY
        echo "- **Helm Charts**: Platform-specific charts for AMD64 and ARM64" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
        echo "- **Consolidate Images**: ${{ needs.consolidate-images.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Create Charts**: ${{ needs.create-helm-chart.result }}" >> $GITHUB_STEP_SUMMARY
