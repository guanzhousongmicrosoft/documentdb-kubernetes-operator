name: E2E Test - DocumentDB with mongosh

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      documentdb_version:
        description: 'DocumentDB image version to test'
        required: false
        default: '16'
      node_count:
        description: 'Number of DocumentDB nodes'
        required: false
        default: '1'
      test_level:
        description: 'Test level to run'
        required: false
        default: 'full'
        type: choice
        options:
          - quick
          - integration
          - full

permissions:
  contents: read
  actions: read

env:
  CERT_MANAGER_NS: cert-manager
  OPERATOR_NS: documentdb-operator
  DB_NS: documentdb-e2e-test
  DB_NAME: documentdb-e2e
  DB_USERNAME: k8s_secret_user
  DB_PASSWORD: K8sSecret100
  DB_PORT: 10260

jobs:
  # Use the reusable build workflow
  build:
    name: Build Images and Charts
    uses: ./.github/workflows/build-and-package.yml
    with:
      image_tag_prefix: 'e2e-test'
      chart_version_prefix: '0.1.0'
    secrets: inherit

  e2e-test:
    name: Run E2E Tests
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: build
    
    strategy:
      matrix:
        include:
          - architecture: amd64
            runner: ubuntu-22.04
            test_scenario_name: "single-node"
            node_count: 1
            instances_per_node: 1
          - architecture: arm64
            runner: ubuntu-22.04-arm
            test_scenario_name: "single-node"
            node_count: 1
            instances_per_node: 1
    
    env:
      # Use outputs from the build workflow with platform-specific images
      OPERATOR_IMAGE_NAME: documentdb-kubernetes-operator/operator
      SIDECAR_IMAGE_NAME: documentdb-kubernetes-operator/sidecar
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}-${{ matrix.architecture }}
      CHART_VERSION: ${{ needs.build.outputs.chart_version }}
      ARCHITECTURE: ${{ matrix.architecture }}
    
    steps:
    - name: Validate runner architecture
      run: |
        echo "Running on ${{ matrix.architecture }} architecture using runner: ${{ matrix.runner }}"
        echo "Expected architecture: ${{ matrix.architecture }}"
        echo "Actual system architecture: $(uname -m)"
        
        # Verify the runner architecture matches expectations
        EXPECTED_ARCH="${{ matrix.architecture }}"
        ACTUAL_ARCH=$(uname -m)
        
        case $ACTUAL_ARCH in
          "x86_64") NORMALIZED_ARCH="amd64" ;;
          "aarch64") NORMALIZED_ARCH="arm64" ;;
          *) NORMALIZED_ARCH="unknown" ;;
        esac
        
        if [[ "$EXPECTED_ARCH" != "$NORMALIZED_ARCH" ]]; then
          echo "❌ Architecture mismatch! Expected: $EXPECTED_ARCH, Got: $NORMALIZED_ARCH"
          exit 1
        fi
        
        echo "✅ Architecture validation passed: $EXPECTED_ARCH"
    
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: 'build-*'
        path: ./artifacts

    - name: Load Docker images from artifacts
      run: |
        echo "Loading platform-specific Docker images from artifacts..."
        cd ./artifacts
        
        # Load the platform-specific images for the current architecture
        if [ -f build-platform-images/platform-specific-images.tar ]; then
          echo "Loading platform-specific Docker images..."
          docker load < build-platform-images/platform-specific-images.tar
          echo "✓ Platform-specific Docker images loaded successfully"
        else
          echo "❌ Platform-specific Docker images artifact not found"
          ls -la build-platform-images/ || echo "Directory not found"
          exit 1
        fi
        
        # Verify images were loaded and show available tags
        echo "Available Docker images:"
        docker images | grep documentdb-kubernetes-operator
        echo "✓ Platform-specific Docker images loaded successfully"

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl netcat-openbsd

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'

    - name: Install MongoDB Shell (mongosh)
      run: |
        echo "Installing mongosh for ${{ matrix.architecture }} architecture..."
        
        # Install mongosh using the official installation method
        curl -fsSL https://pgp.mongodb.com/server-7.0.asc | sudo gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
        
        if [[ "${{ matrix.architecture }}" == "arm64" ]]; then
          echo "deb [ arch=arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
        else
          echo "deb [ arch=amd64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
        fi
        
        sudo apt-get update
        sudo apt-get install -y mongodb-mongosh
        mongosh --version
        echo "✓ mongosh installed successfully for ${{ matrix.architecture }}"

    - name: Create kind cluster
      uses: helm/kind-action@v1.8.0
      with:
        cluster_name: documentdb-e2e-${{ matrix.architecture }}-${{ matrix.test_scenario_name }}

    - name: Load Docker images into kind cluster
      run: |
        echo "Loading Docker images into kind cluster..."
        
        # Load the operator image into kind cluster
        kind load docker-image ghcr.io/${{ github.repository_owner }}/${{ env.OPERATOR_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
          --name documentdb-e2e-${{ matrix.architecture }}-${{ matrix.test_scenario_name }}
        
        # Load the sidecar image into kind cluster
        kind load docker-image ghcr.io/${{ github.repository_owner }}/${{ env.SIDECAR_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
          --name documentdb-e2e-${{ matrix.architecture }}-${{ matrix.test_scenario_name }}
        
        echo "✓ All Docker images loaded into kind cluster successfully"

    - name: Wait for cluster to be ready
      run: |
        echo "Waiting for ${{ matrix.architecture }} cluster to be ready..."
        kubectl cluster-info
        kubectl wait --for=condition=Ready nodes --all --timeout=300s
        
        # Verify node architecture
        echo "Node architecture verification:"
        kubectl get nodes -o jsonpath='{.items[*].status.nodeInfo.architecture}'
        echo ""

    - name: Check cluster resources before cert-manager installation
      run: |
        echo "Checking cluster resources on ${{ matrix.architecture }}..."
        
        # Check node resources
        echo "Node information:"
        kubectl get nodes -o wide
        
        # Check available resources
        echo "Node resource capacity:"
        kubectl describe nodes
        
        # Check current pod resource usage
        echo "Current pods in cluster:"
        kubectl get pods --all-namespaces
        
        # Check system pods status
        echo "System pods status:"
        kubectl get pods -n kube-system
        
        # Check if there are any issues with the cluster
        echo "Recent cluster events:"
        kubectl get events --all-namespaces --sort-by='.lastTimestamp' | tail -10
        
        echo "✓ Cluster resource check completed for ${{ matrix.architecture }}"

    - name: Install cert-manager
      run: |
        echo "Installing cert-manager on ${{ matrix.architecture }}..."
        
        # Add Helm repository with retry logic
        echo "Adding jetstack Helm repository..."
        for i in {1..3}; do
          if helm repo add jetstack https://charts.jetstack.io; then
            echo "✓ Helm repository added successfully"
            break
          else
            echo "⚠️ Failed to add Helm repository (attempt $i/3)"
            sleep 10
          fi
        done
        
        # Update Helm repositories with retry logic
        echo "Updating Helm repositories..."
        for i in {1..3}; do
          if helm repo update; then
            echo "✓ Helm repositories updated successfully"
            break
          else
            echo "⚠️ Failed to update Helm repositories (attempt $i/3)"
            sleep 10
          fi
        done
        
        # Check if cert-manager is already installed
        if helm list -n $CERT_MANAGER_NS 2>/dev/null | grep -q cert-manager; then
          echo "cert-manager is already installed, skipping installation"
          echo "CERT_MANAGER_READY=true" >> $GITHUB_ENV
        else
          echo "Installing cert-manager using default registry..."
          
          # Install cert-manager with default images (quay.io)
          helm install cert-manager jetstack/cert-manager \
            --namespace $CERT_MANAGER_NS \
            --create-namespace \
            --version v1.15.3 \
            --set installCRDs=true \
            --wait --timeout=5m
          
          # Verify installation step by step
          echo "Verifying cert-manager installation..."
          
          # Check if namespace was created
          kubectl get namespace $CERT_MANAGER_NS
          
          # Check if CRDs were installed
          echo "Checking cert-manager CRDs..."
          kubectl get crd | grep cert-manager || echo "No cert-manager CRDs found yet"
          
          # Check pods status with details
          echo "Checking cert-manager pods status..."
          kubectl get pods -n $CERT_MANAGER_NS -o wide
          
          # Check for any failed pods and show logs if needed
          failed_pods=$(kubectl get pods -n $CERT_MANAGER_NS --field-selector=status.phase!=Running --no-headers 2>/dev/null | awk '{print $1}' || echo "")
          if [ ! -z "$failed_pods" ]; then
            echo "⚠️ Found failed/pending pods, checking logs..."
            for pod in $failed_pods; do
              echo "Logs for pod $pod:"
              kubectl logs $pod -n $CERT_MANAGER_NS --tail=10 || echo "No logs available for $pod"
              echo "Events for pod $pod:"
              kubectl describe pod $pod -n $CERT_MANAGER_NS | grep -A 10 Events: || echo "No events for $pod"
            done
          fi
          
          # Wait for pods to be ready with explicit timeout and better error handling
          echo "Waiting for cert-manager pods to be ready..."
          if kubectl wait --for=condition=Ready pods --all -n $CERT_MANAGER_NS --timeout=180s; then
            echo "✓ cert-manager installation completed successfully on ${{ matrix.architecture }}"
            echo "CERT_MANAGER_READY=true" >> $GITHUB_ENV
          else
            echo "❌ cert-manager pods failed to become ready, will use manual certificates"
            kubectl get pods -n $CERT_MANAGER_NS
            kubectl describe pods -n $CERT_MANAGER_NS
            echo "CERT_MANAGER_READY=false" >> $GITHUB_ENV
          fi
        fi

    - name: Setup TLS certificates
      run: |
        # Create the operator namespace first
        kubectl create namespace $OPERATOR_NS --dry-run=client -o yaml | kubectl apply -f -
        
        if [[ "$CERT_MANAGER_READY" == "true" ]]; then
          echo "Using cert-manager for TLS certificates..."
          
          # Create the issuer first
          cat <<EOF | kubectl apply -f -
          apiVersion: cert-manager.io/v1
          kind: Issuer
          metadata:
            name: selfsigned-issuer
            namespace: $OPERATOR_NS
          spec:
            selfSigned: {}
          EOF
          
          # Wait for issuer to be ready
          kubectl wait --for=condition=Ready issuer/selfsigned-issuer -n $OPERATOR_NS --timeout=60s
          
          echo "✓ cert-manager issuer created and ready"
        else
          echo "Creating manual TLS certificates as cert-manager fallback..."
          
          # Generate self-signed certificates for sidecar injector
          echo "Generating self-signed certificates..."
          
          # Create a temporary directory for certificates
          mkdir -p /tmp/certs
          cd /tmp/certs
          
          # Generate CA private key
          openssl genrsa -out ca.key 2048
          
          # Generate CA certificate
          openssl req -new -x509 -days 365 -key ca.key -out ca.crt -subj "/CN=sidecar-injector-ca"
          
          # Generate server private key
          openssl genrsa -out server.key 2048
          
          # Generate server certificate signing request
          openssl req -new -key server.key -out server.csr -subj "/CN=sidecarinjector.$OPERATOR_NS.svc"
          
          # Generate server certificate
          openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key -CAcreateserial -out server.crt -days 365
          
          # Generate client private key
          openssl genrsa -out client.key 2048
          
          # Generate client certificate signing request
          openssl req -new -key client.key -out client.csr -subj "/CN=sidecar-injector-client"
          
          # Generate client certificate
          openssl x509 -req -in client.csr -CA ca.crt -CAkey ca.key -CAcreateserial -out client.crt -days 365
          
          # Create TLS secrets
          echo "Creating TLS secrets..."
          kubectl create secret tls sidecarinjector-server-tls \
            --cert=server.crt --key=server.key -n $OPERATOR_NS
            
          kubectl create secret tls sidecarinjector-client-tls \
            --cert=client.crt --key=client.key -n $OPERATOR_NS
            
          # Cleanup
          cd /
          rm -rf /tmp/certs
          
          echo "✓ Manual TLS certificates created successfully"
        fi

    - name: Install DocumentDB Operator
      run: |
        echo "Installing DocumentDB Operator on ${{ matrix.architecture }} using chart version: ${{ env.CHART_VERSION }}"
        
        echo "Installing from platform-specific local Helm chart..."
        
        # Extract and prepare platform-specific local chart
        if [ -f ./artifacts/build-helm-chart-${{ matrix.architecture }}/documentdb-chart-${{ matrix.architecture }}-${{ env.CHART_VERSION }}.tgz ]; then
          tar -xzf ./artifacts/build-helm-chart-${{ matrix.architecture }}/documentdb-chart-${{ matrix.architecture }}-${{ env.CHART_VERSION }}.tgz
          
          # If cert-manager is not ready, we need to modify the chart to skip cert-manager resources
          if [[ "$CERT_MANAGER_READY" != "true" ]]; then
            echo "Modifying chart to skip cert-manager Certificate resources..."
            
            # Create a temporary values file to disable cert-manager resources
            cat > /tmp/values-override.yaml <<EOF
        certManager:
          enabled: false
        EOF
            
            # Remove cert-manager Certificate resources from the sidecar injector template
            sed -i '/^apiVersion: cert-manager\.io\/v1$/,/^---$/d' ./documentdb-chart-${{ matrix.architecture }}/templates/02_documentdb_sidecar_injector.yaml
            
            echo "✓ Chart modified to skip cert-manager resources"
          fi
          
          # Install the operator using the platform-specific local chart
          if [[ "$CERT_MANAGER_READY" == "true" ]]; then
            helm install documentdb-operator ./documentdb-chart-${{ matrix.architecture }} \
              --namespace $OPERATOR_NS \
              --create-namespace \
              --wait --timeout=15m
          else
            helm install documentdb-operator ./documentdb-chart-${{ matrix.architecture }} \
              --namespace $OPERATOR_NS \
              --create-namespace \
              --values /tmp/values-override.yaml \
              --wait --timeout=15m
          fi
        else
          echo "❌ Platform-specific Helm chart artifact not found"
          ls -la ./artifacts/build-helm-chart-${{ matrix.architecture }}/ || echo "Artifact directory not found"
          exit 1
        fi
        
        kubectl wait --for=condition=Available deployment/documentdb-operator -n $OPERATOR_NS --timeout=300s
        
        # Verify that our newly built images are being used
        echo "Verifying operator deployment uses our newly built images on ${{ matrix.architecture }}..."
        echo "Operator image:"
        kubectl get deployment documentdb-operator -n $OPERATOR_NS -o jsonpath='{.spec.template.spec.containers[0].image}'
        echo ""
        echo "Sidecar injector image (if present):"
        kubectl get deployment documentdb-operator -n $OPERATOR_NS -o jsonpath='{.spec.template.spec.containers[1].image}' || echo "No sidecar container found"
        echo ""

    - name: Create DocumentDB credentials secret
      run: |
        echo "Creating DocumentDB credentials secret for ${{ matrix.architecture }}..."
        
        # Create the namespace first
        kubectl create namespace ${DB_NS} --dry-run=client -o yaml | kubectl apply -f -
        
        # Create the credentials secret as required by the sidecar injector plugin
        # Based on the documentation: the plugin requires a secret named 'documentdb-credentials'
        # with 'username' and 'password' keys
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: documentdb-credentials
          namespace: ${DB_NS}
        type: Opaque
        stringData:
          username: ${DB_USERNAME}
          password: ${DB_PASSWORD}
        EOF
        
        echo "✓ DocumentDB credentials secret created successfully"

    - name: Deploy DocumentDB Cluster - ${{ matrix.test_scenario_name }}
      run: |
        echo "Deploying DocumentDB cluster with configuration: ${{ matrix.test_scenario_name }} on ${{ matrix.architecture }}"
        
        cat <<EOF | kubectl apply -f -
        apiVersion: db.microsoft.com/preview
        kind: DocumentDB
        metadata:
          name: ${DB_NAME}
          namespace: ${DB_NS}
        spec:
          nodeCount: ${{ matrix.node_count }}
          instancesPerNode: ${{ matrix.instances_per_node }}
          documentDBImage: ghcr.io/microsoft/documentdb/documentdb-local:${{ github.event.inputs.documentdb_version || '16' }}
          resource:
            pvcSize: 10Gi
          exposeViaService:
            serviceType: ClusterIP
        EOF

    - name: Wait for DocumentDB cluster to be ready
      run: |
        echo "Waiting for DocumentDB cluster to be ready on ${{ matrix.architecture }}..."
        
        # Calculate expected pod count
        expected_pods=${{ matrix.node_count }}
        
        timeout=300  # 5 minutes
        end_time=$((SECONDS + timeout))
        
        while [ $SECONDS -lt $end_time ]; do
          ready_pods=$(kubectl get pods -n $DB_NS -l cnpg.io/cluster=$DB_NAME -o json | \
                       jq '.items[] | select(.status.phase == "Running" and ([.status.containerStatuses[] | .ready] | all))' | \
                       jq -s 'length')
          
          if [[ "$ready_pods" -eq "$expected_pods" ]]; then
            echo "DocumentDB cluster is ready on ${{ matrix.architecture }}! ($ready_pods/$expected_pods pods ready)"
            break
          fi
          
          echo "Waiting for DocumentDB pods on ${{ matrix.architecture }}... ($ready_pods/$expected_pods ready)"
          kubectl get pods -n $DB_NS
          sleep 15
        done
        
        if [ $SECONDS -ge $end_time ]; then
          echo "Timeout waiting for DocumentDB cluster on ${{ matrix.architecture }}"
          kubectl describe pods -n $DB_NS
          exit 1
        fi

    - name: Setup port forwarding for comprehensive tests
      uses: ./.github/actions/setup-port-forwarding
      with:
        namespace: ${{ env.DB_NS }}
        cluster-name: ${{ env.DB_NAME }}
        port: ${{ env.DB_PORT }}
        architecture: ${{ matrix.architecture }}
        test-type: 'comprehensive'

    - name: Execute comprehensive mongosh tests
      run: |
        echo "Running comprehensive mongosh validation tests on ${{ matrix.architecture }}..."
        
        # Run comprehensive tests with validation using external script
        if mongosh 127.0.0.1:$DB_PORT \
          -u $DB_USERNAME \
          -p $DB_PASSWORD \
          --authenticationMechanism SCRAM-SHA-256 \
          --tls \
          --tlsAllowInvalidCertificates \
          --file scripts/test-scripts/comprehensive_mongosh_tests.js; then
          echo "✓ Comprehensive mongosh tests completed successfully on ${{ matrix.architecture }}"
        else
          echo "❌ Comprehensive mongosh tests failed on ${{ matrix.architecture }}"
          exit 1
        fi

    - name: Cleanup comprehensive test port forwarding
      if: always()
      run: |
        # Stop port-forward if it exists
        if [ -f /tmp/pf_pid ]; then
          PF_PID=$(cat /tmp/pf_pid)
          kill $PF_PID 2>/dev/null || true
          rm -f /tmp/pf_pid
        fi
        
        # Clean up output log
        rm -f /tmp/pf_output.log
        
        # Clean up output log
        rm -f /tmp/pf_output.log

    - name: Setup port forwarding for performance tests
      uses: ./.github/actions/setup-port-forwarding
      with:
        namespace: ${{ env.DB_NS }}
        cluster-name: ${{ env.DB_NAME }}
        port: ${{ env.DB_PORT }}
        architecture: ${{ matrix.architecture }}
        test-type: 'performance'

    - name: Execute performance tests
      run: |
        echo "Running performance validation tests on ${{ matrix.architecture }}..."
        
        # Run performance tests using external script
        if mongosh 127.0.0.1:$DB_PORT \
          -u $DB_USERNAME \
          -p $DB_PASSWORD \
          --authenticationMechanism SCRAM-SHA-256 \
          --tls \
          --tlsAllowInvalidCertificates \
          --file scripts/test-scripts/performance_test.js; then
          echo "✓ Performance tests completed successfully on ${{ matrix.architecture }}"
        else
          echo "❌ Performance tests failed on ${{ matrix.architecture }}"
          exit 1
        fi

    - name: Cleanup performance testing
      if: always()
      run: |
        # Stop performance test port-forward
        if [ -f /tmp/perf_pf_pid ]; then
          PF_PID=$(cat /tmp/perf_pf_pid)
          kill $PF_PID 2>/dev/null || true
          rm -f /tmp/perf_pf_pid
        fi
        
        # Clean up output log
        rm -f /tmp/perf_pf_output.log
        
        # Clean up output log
        rm -f /tmp/perf_pf_output.log

    - name: Test cluster health and monitoring
      run: |
        echo "Testing cluster health and monitoring on ${{ matrix.architecture }}..."
        
        # Check DocumentDB resource status
        kubectl get documentdb $DB_NAME -n $DB_NS -o yaml
        
        # Check pod resources and health
        kubectl top pods -n $DB_NS --containers || echo "Metrics server not available"
        
        # Check logs for any errors
        kubectl logs -n $DB_NS -l cnpg.io/cluster=$DB_NAME --tail=50
        
        # Check events
        kubectl get events -n $DB_NS --sort-by='.lastTimestamp'

    - name: Collect comprehensive logs on failure
      if: failure()
      uses: ./.github/actions/collect-logs
      with:
        architecture: ${{ matrix.architecture }}
        operator-namespace: ${{ env.OPERATOR_NS }}
        db-namespace: ${{ env.DB_NS }}
        db-name: ${{ env.DB_NAME }}

    - name: Test completion summary
      if: always()
      run: |
        echo "## E2E Test Summary for ${{ matrix.architecture }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Architecture**: ${{ matrix.architecture }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Runner**: ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Test Scenario**: ${{ matrix.test_scenario_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Node Count**: ${{ matrix.node_count }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Image Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Chart Version**: ${{ env.CHART_VERSION }}" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ job.status }}" == "success" ]]; then
          echo "- **Status**: ✅ PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Status**: ❌ FAILED" >> $GITHUB_STEP_SUMMARY
        fi

  test-summary:
    name: E2E Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [build, e2e-test]
    steps:
    - name: Generate overall test summary
      run: |
        echo "## E2E Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Parallel Architecture Testing:" >> $GITHUB_STEP_SUMMARY
        echo "- **AMD64**: Tested in parallel on ubuntu-latest" >> $GITHUB_STEP_SUMMARY
        echo "- **ARM64**: Tested in parallel on ubuntu-22.04-arm" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Both architectures run simultaneously for faster feedback!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
        echo "- **Build**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **E2E Tests**: ${{ needs.e2e-test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Overall status
        if [[ "${{ needs.build.result }}" == "success" && "${{ needs.e2e-test.result }}" == "success" ]]; then
          echo "### Overall Status: ✅ ALL TESTS PASSED" >> $GITHUB_STEP_SUMMARY
          echo "Both AMD64 and ARM64 architectures tested successfully in parallel!" >> $GITHUB_STEP_SUMMARY
        else
          echo "### Overall Status: ❌ SOME TESTS FAILED" >> $GITHUB_STEP_SUMMARY
          echo "Check individual job results above for details." >> $GITHUB_STEP_SUMMARY
        fi
