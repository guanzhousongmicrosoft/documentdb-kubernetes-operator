name: Build and Package

on:
  workflow_call:
    inputs:
      image_tag_prefix:
        description: 'Prefix for image tag'
        required: false
        default: 'build'
        type: string
      chart_version_prefix:
        description: 'Prefix for chart version'
        required: false
        default: '0.1.0'
        type: string
    outputs:
      image_tag:
        description: 'Built image tag'
        value: ${{ jobs.build-images.outputs.image_tag }}
      chart_version:
        description: 'Built chart version'
        value: ${{ jobs.create-helm-chart.outputs.chart_version }}

permissions:
  contents: read

env:
  IMAGE_TAG: ${{ inputs.image_tag_prefix }}-${{ github.run_id }}
  CHART_NAME: documentdb-chart
  CHART_VERSION: ${{ inputs.chart_version_prefix }}-${{ github.run_id }}

jobs:
  build-images:
    name: Build Docker Images
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]
        image:
          - name: operator
            dockerfile: Dockerfile
            context: .
            image_path: documentdb-kubernetes-operator/operator
          - name: sidecar
            dockerfile: plugins/sidecar-injector/Dockerfile
            context: plugins/sidecar-injector/
            image_path: documentdb-kubernetes-operator/sidecar
        include:
          - arch: amd64
            base_arch: AMD64
            runner: ubuntu-22.04
          - arch: arm64
            base_arch: ARM64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build ${{ matrix.image.name }} Docker image for ${{ matrix.arch }}
      run: |
        echo "Building ${{ matrix.image.name }} Docker image for ${{ matrix.arch }} architecture..."
        docker buildx build \
          --platform linux/${{ matrix.arch }} \
          --build-arg ARCH=${{ matrix.base_arch }} \
          --tag ghcr.io/${{ github.repository_owner }}/${{ matrix.image.image_path }}:${{ env.IMAGE_TAG }}-${{ matrix.arch }} \
          --load \
          -f ${{ matrix.image.dockerfile }} ${{ matrix.image.context }}
        
        echo "✓ ${{ matrix.image.name }} Docker image built successfully for ${{ matrix.arch }}"

    - name: Save Docker image as artifact
      run: |
        echo "Saving ${{ matrix.image.name }} ${{ matrix.arch }} Docker image as tar file..."
        docker save ghcr.io/${{ github.repository_owner }}/${{ matrix.image.image_path }}:${{ env.IMAGE_TAG }}-${{ matrix.arch }} > ${{ matrix.image.name }}-${{ matrix.arch }}-image.tar
        echo "✓ ${{ matrix.image.name }} ${{ matrix.arch }} Docker image saved to tar file"

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-docker-${{ matrix.image.name }}-${{ matrix.arch }}
        path: ${{ matrix.image.name }}-${{ matrix.arch }}-image.tar
        retention-days: 1

  create-helm-chart:
    name: Create Helm Chart
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-images]
    outputs:
      chart_version: ${{ env.CHART_VERSION }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: Update Helm chart with local image references
      run: |
        # Update the operator image tag and repository in values.yaml
        sed -i '/documentdbk8soperator:/,/tag:/ s|tag:.*|tag: \"${{ env.IMAGE_TAG }}\"|' documentdb-chart/values.yaml
        sed -i '/documentdbk8soperator:/,/repository:/ s|repository:.*|repository: \"ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator\"|' documentdb-chart/values.yaml
        
        # Update the sidecar image tag and repository in values.yaml
        sed -i '/sidecarinjector:/,/tag:/ s|tag:.*|tag: \"${{ env.IMAGE_TAG }}\"|' documentdb-chart/values.yaml
        sed -i '/sidecarinjector:/,/repository:/ s|repository:.*|repository: \"ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar\"|' documentdb-chart/values.yaml
        
        # Update Chart.yaml version
        sed -i "s|^version:.*|version: ${{ env.CHART_VERSION }}|g" documentdb-chart/Chart.yaml
        
        echo "Updated Chart.yaml:"
        cat documentdb-chart/Chart.yaml
        
        echo "Updated values.yaml (with local image references):"
        cat documentdb-chart/values.yaml

    - name: Package Helm chart
      run: |
        # Clean up any existing Chart.lock files
        rm -f ${{ env.CHART_NAME }}/Chart.lock
        
        echo "Running helm dependency update for ${{ env.CHART_NAME }}..."
        helm dependency update ${{ env.CHART_NAME }}
        
        echo "Validating chart..."
        helm lint ${{ env.CHART_NAME }}
        
        echo "Packaging chart with version ${{ env.CHART_VERSION }}..."
        helm package ${{ env.CHART_NAME }} --version ${{ env.CHART_VERSION }}
        
        echo "Generated chart package:"
        ls -la *.tgz

    - name: Upload Helm chart artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-helm-chart
        path: "*.tgz"
        retention-days: 1

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [build-images, create-helm-chart]
    steps:
    - name: Generate Build Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Configuration:" >> $GITHUB_STEP_SUMMARY
        echo "- **Image Tag Prefix**: ${{ inputs.image_tag_prefix }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Chart Version Prefix**: ${{ inputs.chart_version_prefix }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Mode**: Local artifacts only" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### Built Artifacts:" >> $GITHUB_STEP_SUMMARY
        echo "- **Operator Images**: Built for AMD64 and ARM64 (saved as artifacts)" >> $GITHUB_STEP_SUMMARY
        echo "- **Sidecar Images**: Built for AMD64 and ARM64 (saved as artifacts)" >> $GITHUB_STEP_SUMMARY
        echo "- **Helm Chart**: \`${{ env.CHART_VERSION }}\` (saved as artifact)" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Images**: ${{ needs.build-images.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Create Chart**: ${{ needs.create-helm-chart.result }}" >> $GITHUB_STEP_SUMMARY
