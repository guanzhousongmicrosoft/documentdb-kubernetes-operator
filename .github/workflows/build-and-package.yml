name: Build and Package

on:
  workflow_call:
    inputs:
      image_tag_prefix:
        description: 'Prefix for image tag'
        required: false
        default: 'build'
        type: string
      chart_version_prefix:
        description: 'Prefix for chart version'
        required: false
        default: '0.1.0'
        type: string
    outputs:
      image_tag:
        description: 'Built image tag'
        value: ${{ jobs.create-manifests.outputs.image_tag }}
      chart_version:
        description: 'Built chart version'
        value: ${{ jobs.create-helm-chart.outputs.chart_version }}

permissions:
  contents: read

env:
  IMAGE_TAG: ${{ inputs.image_tag_prefix }}-${{ github.run_id }}
  CHART_NAME: documentdb-chart
  CHART_VERSION: ${{ inputs.chart_version_prefix }}-${{ github.run_id }}

jobs:
  build-operator:
    name: Build Operator Images
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            base_arch: AMD64
            runner: ubuntu-22.04
          - arch: arm64
            base_arch: ARM64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build operator Docker image for ${{ matrix.arch }}
      run: |
        echo "Building operator Docker image for ${{ matrix.arch }} architecture..."
        docker buildx build \
          --platform linux/${{ matrix.arch }} \
          --build-arg ARCH=${{ matrix.base_arch }} \
          --tag ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}-${{ matrix.arch }} \
          --load \
          -f Dockerfile .
        
        echo "✓ Operator Docker image built successfully for ${{ matrix.arch }}"

    - name: Save operator Docker image as artifact
      run: |
        echo "Saving operator ${{ matrix.arch }} Docker image as tar file..."
        docker save ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}-${{ matrix.arch }} > operator-${{ matrix.arch }}-image.tar
        echo "✓ Operator ${{ matrix.arch }} Docker image saved to tar file"

    - name: Upload operator Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-docker-operator-${{ matrix.arch }}
        path: operator-${{ matrix.arch }}-image.tar
        retention-days: 1

  build-sidecar:
    name: Build Sidecar Images
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            base_arch: AMD64
            runner: ubuntu-22.04
          - arch: arm64
            base_arch: ARM64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build sidecar Docker image for ${{ matrix.arch }}
      run: |
        echo "Building sidecar Docker image for ${{ matrix.arch }} architecture..."
        docker buildx build \
          --platform linux/${{ matrix.arch }} \
          --build-arg ARCH=${{ matrix.base_arch }} \
          --tag ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}-${{ matrix.arch }} \
          --load \
          -f plugins/sidecar-injector/Dockerfile plugins/sidecar-injector/
        
        echo "✓ Sidecar Docker image built successfully for ${{ matrix.arch }}"

    - name: Save sidecar Docker image as artifact
      run: |
        echo "Saving sidecar ${{ matrix.arch }} Docker image as tar file..."
        docker save ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}-${{ matrix.arch }} > sidecar-${{ matrix.arch }}-image.tar
        echo "✓ Sidecar ${{ matrix.arch }} Docker image saved to tar file"

    - name: Upload sidecar Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-docker-sidecar-${{ matrix.arch }}
        path: sidecar-${{ matrix.arch }}-image.tar
        retention-days: 1

  create-manifests:
    name: Create Multi-Platform Manifests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-operator, build-sidecar]
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
    steps:
    - name: Download all image artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: 'build-docker-*'
        path: ./artifacts

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Enable Docker experimental features
      run: |
        echo "Enabling Docker experimental features for manifest support..."
        mkdir -p ~/.docker
        echo '{"experimental": "enabled"}' > ~/.docker/config.json
        docker version

    - name: Load all Docker images
      run: |
        echo "Loading all Docker images from artifacts..."
        
        # Load operator images
        docker load < ./artifacts/build-docker-operator-amd64/operator-amd64-image.tar
        docker load < ./artifacts/build-docker-operator-arm64/operator-arm64-image.tar
        
        # Load sidecar images
        docker load < ./artifacts/build-docker-sidecar-amd64/sidecar-amd64-image.tar
        docker load < ./artifacts/build-docker-sidecar-arm64/sidecar-arm64-image.tar
        
        echo "✓ All Docker images loaded successfully"
        docker images | grep documentdb-kubernetes-operator

    - name: Create operator multi-platform manifest
      run: |
        echo "Creating multi-platform manifest for operator..."
        
        # Create the manifest for operator
        docker manifest create ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }} \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}-amd64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}-arm64
        
        
        # Inspect the manifest to verify it was created correctly
        docker manifest inspect ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}
        
        echo "✓ Operator multi-platform manifest created successfully"

    - name: Create sidecar multi-platform manifest
      run: |
        echo "Creating multi-platform manifest for sidecar..."
        
        # Create the manifest for sidecar
        docker manifest create ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }} \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}-amd64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}-arm64
        
        # Inspect the manifest to verify it was created correctly
        docker manifest inspect ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}
        
        echo "✓ Sidecar multi-platform manifest created successfully"

    - name: Save multi-platform images as artifacts
      run: |
        echo "Saving multi-platform images as artifacts..."
        
        # Save the multi-platform operator image
        docker save ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }} \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}-amd64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator:${{ env.IMAGE_TAG }}-arm64 \
          > operator-multiplatform-image.tar
        
        # Save the multi-platform sidecar image
        docker save ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }} \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}-amd64 \
          ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar:${{ env.IMAGE_TAG }}-arm64 \
          > sidecar-multiplatform-image.tar
        
        echo "✓ Multi-platform images saved as artifacts"

    - name: Upload multi-platform Docker images
      uses: actions/upload-artifact@v4
      with:
        name: build-multiplatform-images
        path: |
          operator-multiplatform-image.tar
          sidecar-multiplatform-image.tar
        retention-days: 1

  create-helm-chart:
    name: Create Helm Chart
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [create-manifests]
    outputs:
      chart_version: ${{ env.CHART_VERSION }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: Update Helm chart with local image references
      run: |
        # Update the operator image tag and repository in values.yaml
        sed -i '/documentdbk8soperator:/,/tag:/ s|tag:.*|tag: \"${{ env.IMAGE_TAG }}\"|' documentdb-chart/values.yaml
        sed -i '/documentdbk8soperator:/,/repository:/ s|repository:.*|repository: \"ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/operator\"|' documentdb-chart/values.yaml
        
        # Update the sidecar image tag and repository in values.yaml
        sed -i '/sidecarinjector:/,/tag:/ s|tag:.*|tag: \"${{ env.IMAGE_TAG }}\"|' documentdb-chart/values.yaml
        sed -i '/sidecarinjector:/,/repository:/ s|repository:.*|repository: \"ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/sidecar\"|' documentdb-chart/values.yaml
        
        # Update Chart.yaml version
        sed -i "s|^version:.*|version: ${{ env.CHART_VERSION }}|g" documentdb-chart/Chart.yaml
        
        echo "Updated Chart.yaml:"
        cat documentdb-chart/Chart.yaml
        
        echo "Updated values.yaml (with local image references):"
        cat documentdb-chart/values.yaml

    - name: Package Helm chart
      run: |
        # Clean up any existing Chart.lock files
        rm -f ${{ env.CHART_NAME }}/Chart.lock
        
        echo "Running helm dependency update for ${{ env.CHART_NAME }}..."
        helm dependency update ${{ env.CHART_NAME }}
        
        echo "Validating chart..."
        helm lint ${{ env.CHART_NAME }}
        
        echo "Packaging chart with version ${{ env.CHART_VERSION }}..."
        helm package ${{ env.CHART_NAME }} --version ${{ env.CHART_VERSION }}
        
        echo "Generated chart package:"
        ls -la *.tgz

    - name: Upload Helm chart artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-helm-chart
        path: "*.tgz"
        retention-days: 1

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [build-operator, build-sidecar, create-manifests, create-helm-chart]
    steps:
    - name: Generate Build Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Configuration:" >> $GITHUB_STEP_SUMMARY
        echo "- **Image Tag Prefix**: ${{ inputs.image_tag_prefix }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Chart Version Prefix**: ${{ inputs.chart_version_prefix }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Mode**: Local artifacts only" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### Built Artifacts:" >> $GITHUB_STEP_SUMMARY
        echo "- **Operator Images**: Multi-platform (AMD64 + ARM64) with Docker manifest" >> $GITHUB_STEP_SUMMARY
        echo "- **Sidecar Images**: Multi-platform (AMD64 + ARM64) with Docker manifest" >> $GITHUB_STEP_SUMMARY
        echo "- **Helm Chart**: \`${{ env.CHART_VERSION }}\` (saved as artifact)" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Operator**: ${{ needs.build-operator.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Sidecar**: ${{ needs.build-sidecar.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Create Manifests**: ${{ needs.create-manifests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Create Chart**: ${{ needs.create-helm-chart.result }}" >> $GITHUB_STEP_SUMMARY
