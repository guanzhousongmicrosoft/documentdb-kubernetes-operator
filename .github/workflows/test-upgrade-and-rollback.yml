name: TEST - Upgrade and Rollback

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional: Use existing image tag instead of building locally'
        required: false
        type: string
      released_chart_version:
        description: 'Released chart version to upgrade from (default: latest)'
        required: false
        type: string
        default: 'latest'
  workflow_call:
    inputs:
      image_tag:
        description: 'Optional: Use existing image tag instead of building locally'
        required: false
        type: string
      released_chart_version:
        description: 'Released chart version to upgrade from (default: latest)'
        required: false
        type: string
        default: 'latest'

permissions:
  contents: read
  actions: read
  packages: read

env:
  CERT_MANAGER_NS: cert-manager
  OPERATOR_NS: documentdb-operator
  DB_NS: documentdb-upgrade-test
  DB_NAME: documentdb-upgrade
  DB_USERNAME: k8s_secret_user
  DB_PASSWORD: K8sSecret100
  DB_PORT: 10260
  RELEASED_DATABASE_VERSION: 0.109.0
  # Always resolve released baseline images from the canonical org, not the fork owner.
  RELEASED_DATABASE_OWNER: documentdb

jobs:
  build:
    name: Build Images and Charts
    if: ${{ (inputs.image_tag == '' || inputs.image_tag == null) || github.event_name == 'pull_request' }}
    uses: ./.github/workflows/test-build-and-package.yml
    with:
      version: '0.2.0'
    secrets: inherit

  upgrade-and-rollback-test:
    name: Upgrade & Rollback (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')

    strategy:
      matrix:
        include:
          - architecture: amd64
            runner: ubuntu-22.04
            test_scenario_name: "single-node"
            node_count: 1
            instances_per_node: 1
          - architecture: arm64
            runner: ubuntu-22.04-arm
            test_scenario_name: "single-node"
            node_count: 1
            instances_per_node: 1

    env:
      IMAGE_TAG: ${{ (github.event_name == 'pull_request' || inputs.image_tag == '' || inputs.image_tag == null) && needs.build.outputs.image_tag || inputs.image_tag }}
      EXT_IMAGE_TAG: ${{ needs.build.outputs.ext_image_tag || '' }}
      CHART_VERSION: ${{ needs.build.outputs.chart_version || '0.1.0' }}
      DOCUMENTDB_COMBINED_IMAGE: ghcr.io/microsoft/documentdb/documentdb-local:16
      RELEASED_CHART_VERSION: ${{ inputs.released_chart_version || 'latest' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download artifacts
      if: ${{ (inputs.image_tag == '' || inputs.image_tag == null) || github.event_name == 'pull_request' }}
      uses: actions/download-artifact@v4
      with:
        pattern: 'build-*'
        path: ./artifacts

    - name: Determine new DocumentDB and Gateway image references
      run: |
        # Old images should always come from the latest released database baseline for this repository owner.
        OLD_DOCDB="ghcr.io/${{ env.RELEASED_DATABASE_OWNER }}/documentdb-kubernetes-operator/documentdb:${{ env.RELEASED_DATABASE_VERSION }}"
        OLD_GW="ghcr.io/${{ env.RELEASED_DATABASE_OWNER }}/documentdb-kubernetes-operator/gateway:${{ env.RELEASED_DATABASE_VERSION }}"

        # New images come from this workflow run (self-built) or from the provided candidate tag.
        # Database images use a separate version track from operator images.
        # CI-built images are now tagged with the extension version (e.g., 0.109.0-test-RUNID-arch)
        # by test-build-and-package.yml, so no re-tagging is needed.
        if [[ "${{ github.event_name }}" == "pull_request" || -z "${{ inputs.image_tag }}" ]]; then
          NEW_DOCDB="ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/documentdb:${{ env.EXT_IMAGE_TAG }}-${{ matrix.architecture }}"
          NEW_GW="ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/gateway:${{ env.EXT_IMAGE_TAG }}-${{ matrix.architecture }}"
        else
          # External images: read documentDbVersion from values.yaml (separate version track from operator).
          DOCDB_TAG=$(grep 'documentDbVersion:' operator/documentdb-helm-chart/values.yaml | sed 's/.*"\(.*\)".*/\1/')
          echo "Using documentDbVersion from values.yaml: $DOCDB_TAG"
          NEW_DOCDB="ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/documentdb:${DOCDB_TAG}"
          NEW_GW="ghcr.io/${{ github.repository_owner }}/documentdb-kubernetes-operator/gateway:${DOCDB_TAG}"
        fi
        echo "DOCUMENTDB_IMAGE=$NEW_DOCDB" >> $GITHUB_ENV
        echo "GATEWAY_IMAGE=$NEW_GW" >> $GITHUB_ENV
        echo "DOCUMENTDB_OLD_IMAGE=$OLD_DOCDB" >> $GITHUB_ENV
        echo "GATEWAY_OLD_IMAGE=$OLD_GW" >> $GITHUB_ENV
        echo "Old DocumentDB image: $OLD_DOCDB"
        echo "Old Gateway image: $OLD_GW"
        echo "New DocumentDB image: $NEW_DOCDB"
        echo "New Gateway image: $NEW_GW"

    - name: Log test configuration
      run: |
        echo "## Upgrade & Rollback Test Configuration" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [[ -n "${{ inputs.image_tag }}" ]]; then
          echo "- **Mode**: Using provided image tag" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Mode**: Using locally built images" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: \`${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
        fi
        echo "- **Architecture**: \`${{ matrix.architecture }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Released Database Baseline**: \`${{ env.RELEASED_DATABASE_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Old Extension Image**: \`${{ env.DOCUMENTDB_OLD_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **New Extension Image**: \`${{ env.DOCUMENTDB_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Combined Image**: \`${{ env.DOCUMENTDB_COMBINED_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Old Gateway Image**: \`${{ env.GATEWAY_OLD_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **New Gateway Image**: \`${{ env.GATEWAY_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY

    # TODO: Remove this step once release versions > 0.1.3 
    - name: Determine initial DocumentDB image
      run: |
        echo "=== Determining DocumentDB image for initial deployment ==="
        
        # Add the public DocumentDB Helm repository
        helm repo add documentdb https://documentdb.github.io/documentdb-kubernetes-operator 2>/dev/null || true
        helm repo update
        
        # Resolve the released chart version
        CHART_VERSION="${{ env.RELEASED_CHART_VERSION }}"
        if [[ "$CHART_VERSION" == "latest" ]]; then
          RESOLVED_VERSION=$(helm search repo documentdb/documentdb-operator -o json | jq -r '.[0].version' 2>/dev/null || echo "")
          if [[ -z "$RESOLVED_VERSION" || "$RESOLVED_VERSION" == "null" ]]; then
            echo "⚠️ Failed to resolve chart version from Helm repo, defaulting to threshold"
            RESOLVED_VERSION="0.1.3"
          fi
        else
          RESOLVED_VERSION="$CHART_VERSION"
        fi
        echo "Resolved released chart version: $RESOLVED_VERSION"
        
        # Determine image mode based on release version
        # Versions <= 0.1.3 use combined image (no ImageVolume support)
        # Versions > 0.1.3 use extension image (ImageVolume mode)
        THRESHOLD="0.1.3"
        # Strip any pre-release suffix (e.g., 0.1.3-rc1 → 0.1.3) for clean semver comparison
        CLEAN_VERSION=$(echo "$RESOLVED_VERSION" | sed 's/-.*//')
        if [[ "$(printf '%s\n' "$THRESHOLD" "$CLEAN_VERSION" | sort -V | head -n1)" == "$CLEAN_VERSION" ]]; then
          echo "Released version $RESOLVED_VERSION <= $THRESHOLD → combined image required"
          USE_COMBINED=true
        else
          echo "Released version $RESOLVED_VERSION > $THRESHOLD → extension image supported"
          USE_COMBINED=false
        fi
        
        # Persist USE_COMBINED for later steps
        # TODO: Remove once we deprecate combined mode
        echo "USE_COMBINED=$USE_COMBINED" >> $GITHUB_ENV
        
        # Set the initial image based on determination
        COMBINED_IMAGE="${{ env.DOCUMENTDB_COMBINED_IMAGE }}"
        EXTENSION_IMAGE="${{ env.DOCUMENTDB_OLD_IMAGE }}"
        if [[ "$USE_COMBINED" == "true" ]]; then
          echo "DOCUMENTDB_INITIAL_IMAGE=$COMBINED_IMAGE" >> $GITHUB_ENV
          # In combined mode, the gateway is part of the combined image
          echo "GATEWAY_OLD_IMAGE=$COMBINED_IMAGE" >> $GITHUB_ENV
          echo "✓ Using combined image for initial deployment: $COMBINED_IMAGE"
        else
          echo "DOCUMENTDB_INITIAL_IMAGE=$EXTENSION_IMAGE" >> $GITHUB_ENV
          echo "✓ Using extension image for initial deployment: $EXTENSION_IMAGE"
        fi

    - name: Setup test environment
      uses: ./.github/actions/setup-test-environment
      with:
        test-type: 'e2e'
        architecture: ${{ matrix.architecture }}
        runner: ${{ matrix.runner }}
        test-scenario-name: ${{ matrix.test_scenario_name }}
        node-count: '${{ matrix.node_count }}'
        instances-per-node: '${{ matrix.instances_per_node }}'
        cert-manager-namespace: ${{ env.CERT_MANAGER_NS }}
        operator-namespace: ${{ env.OPERATOR_NS }}
        db-namespace: ${{ env.DB_NS }}
        db-cluster-name: ${{ env.DB_NAME }}
        db-username: ${{ env.DB_USERNAME }}
        db-password: ${{ env.DB_PASSWORD }}
        db-port: ${{ env.DB_PORT }}
        image-tag: ${{ env.IMAGE_TAG }}
        documentdb-image-tag: ${{ env.EXT_IMAGE_TAG }}
        chart-version: ${{ env.CHART_VERSION }}
        documentdb-image: ${{ env.DOCUMENTDB_INITIAL_IMAGE }}
        gateway-image: ${{ env.GATEWAY_OLD_IMAGE }}
        use-external-images: ${{ github.event_name != 'pull_request' && inputs.image_tag != '' && inputs.image_tag != null }}
        released-chart-version: ${{ env.RELEASED_CHART_VERSION }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository-owner: ${{ github.repository_owner }}

    - name: Setup port forwarding for data seeding
      uses: ./.github/actions/setup-port-forwarding
      with:
        namespace: ${{ env.DB_NS }}
        cluster-name: ${{ env.DB_NAME }}
        port: ${{ env.DB_PORT }}
        architecture: ${{ matrix.architecture }}
        test-type: 'comprehensive'

    - name: Seed test data before upgrade
      run: |
        echo "=== Data Persistence: Writing seed data before upgrade ==="
        mongosh 127.0.0.1:$DB_PORT \
          -u $DB_USERNAME \
          -p $DB_PASSWORD \
          --authenticationMechanism SCRAM-SHA-256 \
          --tls \
          --tlsAllowInvalidCertificates \
          --eval '
            db = db.getSiblingDB("upgrade_test_db");
            db.test_collection.insertOne({ _id: "upgrade_marker", step: "pre-upgrade", timestamp: new Date().toISOString() });
            db.test_collection.insertOne({ _id: "persistence_check", data: "this_must_survive_rollback", count: 42 });
            var count = db.test_collection.countDocuments();
            print("✓ Seed data written: " + count + " documents");
            assert(count === 2, "Expected 2 documents but found " + count);
          '
        echo "✓ Seed data written successfully on old version"

    - name: Cleanup port forwarding after data seeding
      if: always()
      run: |
        if [ -f /tmp/pf_pid ]; then
          PF_PID=$(cat /tmp/pf_pid)
          kill $PF_PID 2>/dev/null || true
          rm -f /tmp/pf_pid
        fi
        rm -f /tmp/pf_output.log

    - name: "Step 1: Operator Control Plane Upgrade (released → built)"
      run: |
        echo "=== Step 1: Operator Control Plane Upgrade ==="
        echo "Upgrading operator from released chart to locally built version on ${{ matrix.architecture }}..."
        
        ARCH="${{ matrix.architecture }}"
        
        # --- Baseline from Released Operator ---
        echo ""
        echo "--- Baseline (Released Operator) ---"
        echo "Helm release info:"
        helm list -n $OPERATOR_NS
        
        RELEASED_OPERATOR_IMAGE=$(kubectl get deployment documentdb-operator -n $OPERATOR_NS -o jsonpath='{.spec.template.spec.containers[0].image}')
        echo "Released operator image: $RELEASED_OPERATOR_IMAGE"
        
        # Record DB pod state before operator upgrade
        echo ""
        echo "DB pods before operator upgrade:"
        kubectl get pods -n $DB_NS -l cnpg.io/cluster=$DB_NAME -o wide
        PRE_UPGRADE_UIDS=$(kubectl get pods -n $DB_NS -l cnpg.io/cluster=$DB_NAME -o jsonpath='{.items[*].metadata.uid}')
        echo "Pod UIDs: $PRE_UPGRADE_UIDS"
        
        # --- Prepare Built Chart ---
        echo ""
        echo "--- Preparing Built Chart ---"
        CHART_ARTIFACT_DIR="./artifacts/build-helm-chart-${ARCH}"
        EXPECTED_CHART_FILE="$CHART_ARTIFACT_DIR/documentdb-chart-${{ env.CHART_VERSION }}-${ARCH}.tgz"
        
        if [ ! -f "$EXPECTED_CHART_FILE" ]; then
          echo "❌ Built Helm chart not found: $EXPECTED_CHART_FILE"
          ls -la "$CHART_ARTIFACT_DIR/" || echo "Chart artifact directory not found"
          exit 1
        fi
        
        echo "Extracting built chart: $EXPECTED_CHART_FILE"
        rm -rf ./documentdb-chart
        tar -xzf "$EXPECTED_CHART_FILE"
        
        echo "Built chart version:"
        cat ./documentdb-chart/Chart.yaml | grep -E "^(version|appVersion):"
        
        # --- Apply CRDs before Helm Upgrade ---
        # Helm does not upgrade CRDs on `helm upgrade` (only on `helm install`).
        # We must apply them separately so new fields (e.g. spec.schemaVersion) are
        # recognised by the API server and passed to the validating webhook.
        echo ""
        echo "--- Applying CRDs from new chart ---"
        kubectl apply --server-side --force-conflicts -f ./documentdb-chart/crds/
        echo "CRDs applied."
        
        # --- Perform Helm Upgrade ---
        echo ""
        echo "--- Performing Helm Upgrade ---"
        LOCAL_IMAGE_TAG="${{ env.IMAGE_TAG }}-${ARCH}"
        echo "Upgrading with image tag: $LOCAL_IMAGE_TAG"
        
        helm upgrade documentdb-operator ./documentdb-chart \
          --namespace $OPERATOR_NS \
          --set documentDbVersion="$LOCAL_IMAGE_TAG" \
          --set image.documentdbk8soperator.tag="$LOCAL_IMAGE_TAG" \
          --set image.documentdbk8soperator.pullPolicy=IfNotPresent \
          --set image.sidecarinjector.tag="$LOCAL_IMAGE_TAG" \
          --set image.sidecarinjector.pullPolicy=IfNotPresent \
          --wait --timeout=15m
        
        echo "Helm upgrade completed. Release info:"
        helm list -n $OPERATOR_NS
        
        # --- Verify Upgraded Operator ---
        echo ""
        echo "--- Verifying Upgraded Operator ---"
        kubectl wait --for=condition=Available deployment/documentdb-operator -n $OPERATOR_NS --timeout=300s
        
        UPGRADED_OPERATOR_IMAGE=$(kubectl get deployment documentdb-operator -n $OPERATOR_NS -o jsonpath='{.spec.template.spec.containers[0].image}')
        echo "Upgraded operator image: $UPGRADED_OPERATOR_IMAGE"
        
        if [[ "$UPGRADED_OPERATOR_IMAGE" == "$RELEASED_OPERATOR_IMAGE" ]]; then
          echo "❌ Operator image did not change after upgrade"
          exit 1
        fi
        echo "✓ Operator image changed: $RELEASED_OPERATOR_IMAGE → $UPGRADED_OPERATOR_IMAGE"
        
        # --- Verify DB Pod Stability ---
        echo ""
        echo "--- Verifying DB Pod Stability ---"
        kubectl get pods -n $DB_NS -l cnpg.io/cluster=$DB_NAME -o wide
        POST_UPGRADE_UIDS=$(kubectl get pods -n $DB_NS -l cnpg.io/cluster=$DB_NAME -o jsonpath='{.items[*].metadata.uid}')
        echo "Pod UIDs after upgrade: $POST_UPGRADE_UIDS"
        
        if [[ "$PRE_UPGRADE_UIDS" == "$POST_UPGRADE_UIDS" ]]; then
          echo "✓ DB pod UIDs unchanged — operator upgrade did not restart DB pods"
        else
          echo "⚠️ DB pod UIDs changed — pods may have been restarted during operator upgrade"
          echo "  Before: $PRE_UPGRADE_UIDS"
          echo "  After:  $POST_UPGRADE_UIDS"
        fi
        
        # --- Verify Cluster Health ---
        echo ""
        echo "--- Verifying Cluster Health ---"
        timeout 300 bash -c '
        while true; do
          DB_STATUS=$(kubectl get documentdb "$1" -n "$2" -o jsonpath="{.status.status}" 2>/dev/null)
          CLUSTER_STATUS=$(kubectl get cluster "$1" -n "$2" -o jsonpath="{.status.phase}" 2>/dev/null)
          echo "DocumentDB status: $DB_STATUS, CNPG phase: $CLUSTER_STATUS"
          if [[ "$DB_STATUS" == "Cluster in healthy state" && "$CLUSTER_STATUS" == "Cluster in healthy state" ]]; then
            echo "✓ Cluster is healthy after operator upgrade"
            break
          fi
          sleep 10
        done
        ' -- "$DB_NAME" "$DB_NS"
        
        echo ""
        echo "✅ Step 1 passed: Operator control plane upgraded successfully"
        echo "  Operator: $RELEASED_OPERATOR_IMAGE → $UPGRADED_OPERATOR_IMAGE"

    - name: Setup port forwarding for operator upgrade verification
      uses: ./.github/actions/setup-port-forwarding
      with:
        namespace: ${{ env.DB_NS }}
        cluster-name: ${{ env.DB_NAME }}
        port: ${{ env.DB_PORT }}
        architecture: ${{ matrix.architecture }}
        test-type: 'comprehensive'

    - name: Verify data persistence after operator upgrade
      run: |
        echo "=== Data Persistence: Verifying after operator upgrade ==="
        mongosh 127.0.0.1:$DB_PORT \
          -u $DB_USERNAME \
          -p $DB_PASSWORD \
          --authenticationMechanism SCRAM-SHA-256 \
          --tls \
          --tlsAllowInvalidCertificates \
          --eval '
            db = db.getSiblingDB("upgrade_test_db");
            var count = db.test_collection.countDocuments();
            assert(count === 2, "Expected 2 documents but found " + count + " after operator upgrade");
            print("✓ All " + count + " documents persisted through operator upgrade");
          '
        echo "✓ Data persistence verified after operator upgrade"

    - name: Cleanup port forwarding after operator upgrade verification
      if: always()
      run: |
        if [ -f /tmp/pf_pid ]; then
          PF_PID=$(cat /tmp/pf_pid)
          kill $PF_PID 2>/dev/null || true
          rm -f /tmp/pf_pid
        fi
        rm -f /tmp/pf_output.log

    # ============================================================
    # TODO: Remove the following 4 steps once released version > 0.1.3
    # When the released operator uses combined mode, the cluster must be
    # recreated under the upgraded operator to switch to ImageVolume mode.
    # ============================================================

    - name: "Recreate cluster for ImageVolume mode (combined → extension)"
      if: env.USE_COMBINED == 'true'
      run: |
        echo "=== Recreating cluster: combined mode → ImageVolume mode ==="
        echo "The released operator deployed in combined mode. After operator upgrade,"
        echo "we must recreate the cluster so the new operator deploys it in ImageVolume mode."
        
        # Delete the combined-mode cluster
        echo ""
        echo "Deleting combined-mode cluster..."
        kubectl delete documentdb $DB_NAME -n $DB_NS --wait=false
        
        echo "Waiting for DocumentDB to be deleted..."
        timeout 300 bash -c '
        while true; do
          db_exists=$(kubectl -n "$1" get documentdb "$2" --ignore-not-found -o name)
          if [[ -z "$db_exists" ]]; then
            echo "✓ DocumentDB deleted successfully."
            break
          fi
          echo "DocumentDB still exists. Waiting..."
          sleep 10
        done
        ' -- "$DB_NS" "$DB_NAME"
        
        echo "Waiting for cluster pods to be cleaned up..."
        timeout 120 bash -c '
        while true; do
          pod_count=$(kubectl get pods -n "$1" -l cnpg.io/cluster="$2" --no-headers 2>/dev/null | wc -l)
          if [[ "$pod_count" -eq 0 ]]; then
            echo "✓ All cluster pods cleaned up."
            break
          fi
          echo "Still $pod_count pods remaining. Waiting..."
          sleep 5
        done
        ' -- "$DB_NS" "$DB_NAME"
        
        echo "Cleaning up old PVCs..."
        kubectl delete pvc -n $DB_NS -l cnpg.io/cluster=$DB_NAME --wait=true --timeout=60s || true
        
        # Create a fresh cluster with extension image under the upgraded operator
        OLD_EXTENSION="${{ env.DOCUMENTDB_OLD_IMAGE }}"
        OLD_GATEWAY="${{ env.GATEWAY_OLD_IMAGE }}"
        echo ""
        echo "Creating new cluster with ImageVolume mode..."
        echo "  Extension image: $OLD_EXTENSION"
        echo "  Gateway image:   $OLD_GATEWAY"
        cat <<EOF | kubectl apply -f -
        apiVersion: documentdb.io/preview
        kind: DocumentDB
        metadata:
          name: $DB_NAME
          namespace: $DB_NS
        spec:
          nodeCount: ${{ matrix.node_count }}
          instancesPerNode: ${{ matrix.instances_per_node }}
          documentDBImage: $OLD_EXTENSION
          gatewayImage: $OLD_GATEWAY
          resource:
            storage:
              pvcSize: 5Gi
              storageClass: csi-hostpath-sc
          exposeViaService:
            serviceType: ClusterIP
        EOF
        
        echo "Waiting for recreated cluster to become healthy..."
        timeout 600 bash -c '
        while true; do
          DB_STATUS=$(kubectl get documentdb "$1" -n "$2" -o jsonpath="{.status.status}" 2>/dev/null)
          CLUSTER_STATUS=$(kubectl get cluster "$1" -n "$2" -o jsonpath="{.status.phase}" 2>/dev/null)
          echo "DocumentDB status: $DB_STATUS, CNPG phase: $CLUSTER_STATUS"
          if [[ "$DB_STATUS" == "Cluster in healthy state" && "$CLUSTER_STATUS" == "Cluster in healthy state" ]]; then
            echo "✓ Recreated cluster is healthy"
            break
          fi
          sleep 10
        done
        ' -- "$DB_NAME" "$DB_NS"
        
        # Update DOCUMENTDB_INITIAL_IMAGE so Step 2 baseline check uses the correct image
        echo "DOCUMENTDB_INITIAL_IMAGE=$OLD_EXTENSION" >> $GITHUB_ENV
        echo ""
        echo "✅ Cluster recreated in ImageVolume mode"
        echo "  DOCUMENTDB_INITIAL_IMAGE updated to: $OLD_EXTENSION"

    - name: Setup port forwarding for re-seeding after recreation
      if: env.USE_COMBINED == 'true'
      uses: ./.github/actions/setup-port-forwarding
      with:
        namespace: ${{ env.DB_NS }}
        cluster-name: ${{ env.DB_NAME }}
        port: ${{ env.DB_PORT }}
        architecture: ${{ matrix.architecture }}
        test-type: 'comprehensive'

    - name: Re-seed test data after cluster recreation
      if: env.USE_COMBINED == 'true'
      run: |
        echo "=== Re-seeding test data after cluster recreation ==="
        mongosh 127.0.0.1:$DB_PORT \
          -u $DB_USERNAME \
          -p $DB_PASSWORD \
          --authenticationMechanism SCRAM-SHA-256 \
          --tls \
          --tlsAllowInvalidCertificates \
          --eval '
            db = db.getSiblingDB("upgrade_test_db");
            db.test_collection.insertOne({ _id: "upgrade_marker", step: "pre-upgrade", timestamp: new Date().toISOString() });
            db.test_collection.insertOne({ _id: "persistence_check", data: "this_must_survive_rollback", count: 42 });
            var count = db.test_collection.countDocuments();
            print("✓ Seed data written: " + count + " documents");
            assert(count === 2, "Expected 2 documents but found " + count);
          '
        echo "✓ Seed data re-written after cluster recreation"

    - name: Cleanup port forwarding after re-seeding
      if: always() && env.USE_COMBINED == 'true'
      run: |
        if [ -f /tmp/pf_pid ]; then
          PF_PID=$(cat /tmp/pf_pid)
          kill $PF_PID 2>/dev/null || true
          rm -f /tmp/pf_pid
        fi
        rm -f /tmp/pf_output.log

    # ============================================================
    # END TODO: Remove the above 4 steps once released version > 0.1.3
    # ============================================================

    - name: "Step 2: Upgrade Both Extension and Gateway Images"
      run: |
        echo "=== Step 2: Upgrade Both Extension and Gateway Images ==="
        echo "Testing simultaneous extension + gateway upgrade on ${{ matrix.architecture }}..."
        
        OLD_EXTENSION="${{ env.DOCUMENTDB_OLD_IMAGE }}"
        NEW_EXTENSION="${{ env.DOCUMENTDB_IMAGE }}"
        OLD_GATEWAY="${{ env.GATEWAY_OLD_IMAGE }}"
        NEW_GATEWAY="${{ env.GATEWAY_IMAGE }}"
        
        # Verify baseline: cluster deployed with old images
        CURRENT_EXTENSION=$(kubectl get documentdb $DB_NAME -n $DB_NS -o jsonpath='{.spec.documentDBImage}')
        echo "Current extension image: $CURRENT_EXTENSION"
        if [[ "$CURRENT_EXTENSION" != "$OLD_EXTENSION" ]]; then
          echo "❌ Expected old extension image $OLD_EXTENSION but found $CURRENT_EXTENSION"
          exit 1
        fi
        
        CURRENT_GATEWAY=$(kubectl get cluster $DB_NAME -n $DB_NS -o jsonpath='{.spec.plugins[0].parameters.gatewayImage}')
        echo "Current gateway image: $CURRENT_GATEWAY"
        if [[ "$CURRENT_GATEWAY" != "$OLD_GATEWAY" ]]; then
          echo "❌ Expected old gateway image $OLD_GATEWAY but found $CURRENT_GATEWAY"
          exit 1
        fi
        echo "✓ Cluster deployed with old images"
        
        # Record and verify version before upgrade
        VERSION_BEFORE=$(kubectl get documentdb $DB_NAME -n $DB_NS -o jsonpath='{.status.schemaVersion}')
        echo "DocumentDB schema version before upgrade: $VERSION_BEFORE"

        if [[ -z "$VERSION_BEFORE" ]]; then
          echo "❌ status.schemaVersion is empty before upgrade"
          exit 1
        fi
        echo "✓ DocumentDB schema version is populated before upgrade"
        
        # Patch both images simultaneously
        echo ""
        echo "Upgrading both images..."
        echo "  Extension: $OLD_EXTENSION → $NEW_EXTENSION"
        echo "  Gateway:   $OLD_GATEWAY → $NEW_GATEWAY"
        kubectl patch documentdb $DB_NAME -n $DB_NS --type='merge' \
          -p "{\"spec\":{\"documentDBImage\":\"$NEW_EXTENSION\",\"gatewayImage\":\"$NEW_GATEWAY\"}}"
        
        echo "Waiting for cluster to be healthy with new images..."
        timeout 600 bash -c '
        while true; do
          DB_STATUS=$(kubectl get documentdb "$1" -n "$2" -o jsonpath="{.status.status}" 2>/dev/null)
          CLUSTER_STATUS=$(kubectl get cluster "$1" -n "$2" -o jsonpath="{.status.phase}" 2>/dev/null)
          SCHEMA_VERSION=$(kubectl get documentdb "$1" -n "$2" -o jsonpath="{.status.schemaVersion}" 2>/dev/null || echo "N/A")
          echo "DocumentDB status: $DB_STATUS, CNPG phase: $CLUSTER_STATUS, schemaVersion: $SCHEMA_VERSION"
          if [[ "$DB_STATUS" == "Cluster in healthy state" && "$CLUSTER_STATUS" == "Cluster in healthy state" ]]; then
            HEALTHY_PODS=$(kubectl get cluster "$1" -n "$2" -o jsonpath="{.status.instancesStatus.healthy}" 2>/dev/null | jq length 2>/dev/null || echo "0")
            if [[ "$HEALTHY_PODS" -ge "1" ]]; then
              # Verify pods are actually running the new extension image
              # With ImageVolume (K8s >= 1.35), the extension image is mounted as a volume, not an init container
              POD_IMAGES=$(kubectl get pods -n "$2" -l cnpg.io/cluster="$1" -o jsonpath="{.items[*].spec.volumes[*].image.reference}" 2>/dev/null)
              if echo "$POD_IMAGES" | grep -q "$3"; then
                echo "✓ Cluster healthy with $HEALTHY_PODS pods running new images"
                break
              else
                echo "Pods not yet running new extension image, waiting..."
              fi
            fi
          fi
          sleep 10
        done
        ' -- "$DB_NAME" "$DB_NS" "$NEW_EXTENSION"
        
        # Verify extension image
        FINAL_EXTENSION=$(kubectl get documentdb $DB_NAME -n $DB_NS -o jsonpath='{.spec.documentDBImage}')
        if [[ "$FINAL_EXTENSION" != "$NEW_EXTENSION" ]]; then
          echo "❌ Extension image not applied: expected $NEW_EXTENSION, got $FINAL_EXTENSION"
          exit 1
        fi
        echo "✓ Extension image upgraded to $NEW_EXTENSION"
        
        # Verify gateway image in CNPG cluster
        FINAL_GATEWAY=$(kubectl get cluster $DB_NAME -n $DB_NS -o jsonpath='{.spec.plugins[0].parameters.gatewayImage}')
        if [[ "$FINAL_GATEWAY" != "$NEW_GATEWAY" ]]; then
          echo "❌ Gateway image not applied: expected $NEW_GATEWAY, got $FINAL_GATEWAY"
          exit 1
        fi
        echo "✓ Gateway image upgraded to $NEW_GATEWAY"
        
        # Verify DocumentDB schema version unchanged (two-phase default: schema stays at old version)
        VERSION_AFTER=$(kubectl get documentdb $DB_NAME -n $DB_NS -o jsonpath='{.status.schemaVersion}')
        echo "DocumentDB schema version after upgrade: $VERSION_AFTER"
        if [[ -z "$VERSION_AFTER" ]]; then
          echo "❌ status.schemaVersion is empty after upgrade"
          exit 1
        fi
        if [[ "$VERSION_AFTER" != "$VERSION_BEFORE" ]]; then
          echo "❌ Schema version changed from $VERSION_BEFORE to $VERSION_AFTER — expected unchanged (two-phase default)"
          exit 1
        fi
        echo "✓ Schema version unchanged after binary upgrade: $VERSION_AFTER (two-phase default validated)"
        
        # Verify status fields
        echo ""
        echo "=== Status Field Verification ==="
        STATUS_DB_IMAGE=$(kubectl get documentdb $DB_NAME -n $DB_NS -o jsonpath='{.status.documentDBImage}')
        echo "status.documentDBImage: $STATUS_DB_IMAGE"
        if [[ "$STATUS_DB_IMAGE" == "$NEW_EXTENSION" ]]; then
          echo "✓ status.documentDBImage matches new extension image"
        else
          echo "⚠️ status.documentDBImage ($STATUS_DB_IMAGE) does not match expected ($NEW_EXTENSION)"
        fi
        
        STATUS_GATEWAY_IMAGE=$(kubectl get documentdb $DB_NAME -n $DB_NS -o jsonpath='{.status.gatewayImage}')
        echo "status.gatewayImage: $STATUS_GATEWAY_IMAGE"
        if [[ "$STATUS_GATEWAY_IMAGE" == "$NEW_GATEWAY" ]]; then
          echo "✓ status.gatewayImage matches new gateway image"
        else
          echo "⚠️ status.gatewayImage ($STATUS_GATEWAY_IMAGE) does not match expected ($NEW_GATEWAY)"
        fi
        
        echo ""
        echo "✅ Step 2 passed: Both images upgraded successfully"
        echo "  Extension: $OLD_EXTENSION → $NEW_EXTENSION"
        echo "  Gateway:   $OLD_GATEWAY → $NEW_GATEWAY"

    - name: Setup port forwarding for upgrade verification
      uses: ./.github/actions/setup-port-forwarding
      with:
        namespace: ${{ env.DB_NS }}
        cluster-name: ${{ env.DB_NAME }}
        port: ${{ env.DB_PORT }}
        architecture: ${{ matrix.architecture }}
        test-type: 'comprehensive'

    - name: Verify data persistence after upgrade
      run: |
        echo "=== Data Persistence: Verifying after upgrade ==="
        mongosh 127.0.0.1:$DB_PORT \
