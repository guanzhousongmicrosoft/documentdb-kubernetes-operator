              CURRENT_GW_PARAM=$(kubectl get cluster "$1" -n "$2" -o jsonpath="{.spec.plugins[0].parameters.gatewayImage}" 2>/dev/null)
              if [[ "$CURRENT_GW_PARAM" == "$3" ]]; then
