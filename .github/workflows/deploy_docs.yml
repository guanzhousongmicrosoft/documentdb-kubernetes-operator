name: Deploy Versioned Docs
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  release:
    types: [published]

permissions:
  contents: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: pip install "mkdocs-material==9.5.19" "mike==2.1.3"

      - name: Configure Git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # On push to main: deploy as "dev" version
      - name: Deploy dev docs
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: mike deploy dev --push --update-aliases

      # On release: deploy versioned docs and update "latest" alias
      - name: Deploy release docs
        if: github.event_name == 'release'
        run: |
          VERSION=${{ github.event.release.tag_name }}
          mike deploy ${VERSION} latest --push --update-aliases
          mike set-default latest --push
