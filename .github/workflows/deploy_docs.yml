name: Deploy Documentation
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Install dependencies
        run: pip install mkdocs mkdocs-material
      - name: Build documentation
        run: mkdocs build --clean

      # Preserve any Helm chart artifacts already published on GitHub Pages
      # so that a docs-only redeploy does not wipe the Helm repository.
      - name: Restore existing Helm artifacts from GitHub Pages
        env:
          HELM_REPO_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          if curl -fsSL "${HELM_REPO_URL}/index.yaml" -o site/index.yaml; then
            echo "Restoring chart packages listed in existing index.yaml"
            grep -Eo '[a-zA-Z0-9._-]+\.tgz' site/index.yaml | sort -u | while read -r tgz; do
              curl -fsSL "${HELM_REPO_URL}/${tgz}" -o "site/${tgz}" || echo "Warning: failed to download ${tgz}"
            done
          else
            echo "No existing Helm index found – first deployment."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
