site_name: DocumentDB-Kubernetes-Operator
repo_url: https://github.com/documentdb/documentdb-kubernetes-operator
edit_uri: edit/main/docs/operator-public-documentation/
docs_dir: docs/operator-public-documentation

# Material theme is required for mike's version selector dropdown;
# the readthedocs theme does not support it.
theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

# mike (https://github.com/jimporter/mike) enables versioned docs on GitHub Pages.
# Each release gets a frozen snapshot (e.g., /0.2.0/), and "latest" always points
# to the most recent release. Unreleased changes on main deploy to /dev/ only.
# See .github/workflows/deploy_docs.yml for the deployment logic.
extra:
  version:
    provider: mike
    default: latest

# Mermaid is configured via pymdownx.superfences custom_fences below.
# The Material theme handles mermaid rendering without external CDN dependencies.

nav:
  - Preview:
      - Home: preview/index.md
      - Getting Started:
          - Before You Start: preview/getting-started/before-you-start.md
          - "Quickstart: Kind": preview/getting-started/quickstart-kind.md
          - "Quickstart: K3s": preview/getting-started/quickstart-k3s.md
          - Deploy on AKS: preview/getting-started/deploy-on-aks.md
          - Deploy on EKS: preview/getting-started/deploy-on-eks.md
          - Connecting to DocumentDB: preview/getting-started/connecting-to-documentdb.md
      - Architecture:
          - Overview: preview/architecture/overview.md
      - Configuration:
          - Storage: preview/configuration/storage.md
          - Networking: preview/configuration/networking.md
          - TLS: preview/configuration/tls.md
      - Operations:
          - Upgrades: preview/operations/upgrades.md
          - Failover: preview/operations/failover.md
          - Backup and Restore: preview/operations/backup-and-restore.md
          - Restore a Deleted Cluster: preview/operations/restore-deleted-cluster.md
          - Maintenance: preview/operations/maintenance.md
      - High Availability:
          - Overview: preview/high-availability/overview.md
          - Local HA: preview/high-availability/local-ha.md
      - Advanced Configuration: preview/advanced-configuration/README.md
      - Multi-Region Deployment:
          - Overview: preview/multi-region-deployment/overview.md
          - Setup Guide: preview/multi-region-deployment/setup.md
          - Failover Procedures: preview/multi-region-deployment/failover-procedures.md
      - FAQ: preview/faq.md
      - Tools:
          - Kubectl Plugin: preview/kubectl-plugin.md
      - API Reference: preview/api-reference.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
